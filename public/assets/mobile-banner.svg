<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="128" viewBox="0 0 1080 128" role="img" aria-labelledby="title desc">
  <title id="title">Words of the Buddha Reddit mobile banner background</title>
  <desc id="desc">A warm dark banner background with subtle mandala geometry and flowing line patterns.</desc>
  <defs>
