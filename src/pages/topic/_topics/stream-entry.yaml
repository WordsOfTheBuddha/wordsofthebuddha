title: "Stream Entry"
description: "The first stage of awakening, where one overcomes the fetters of 1.) personal existence view: view of being someone, that one is an embodied being, 2.) doubt or perplexity regarding suffering, its arising, its ending, and the way of practice leading to the end of suffering, and 3.) adherence to rules and observances as a means of liberation. One who has entered the stream is no longer bound for the lower realms, is fixed in destiny, and is bound for full awakening. The four factors of stream-entry are: 1.) association with persons of integrity, 2.) hearing the true teaching, 3.) wise attention, and 4.) practice in accordance with the Dhamma."
