title: "Dependent Co-Arising"
description: "Dependent Co-Arising is the principle that when this exists, that comes to be; with the arising of this, that arises; when this does not exist, that does not come to be; with the cessation of this, that ceases. In the discourses it names both the general pattern of conditionality and, often, the twelve-link unfolding of suffering."
