title: "Trainee"
description: "A noble disciple who is still in training (sekha; one who trains) toward full awakening—on the path or at a fruition short of arahantship. A trainee is defined as one who trains in higher virtue, higher mind, and higher wisdom."
synonyms:
    - learner
    - one in training
