title: "Contact"
description: "The meeting of sense faculty, sense object, and the corresponding consciousness—the convergence of three. Contact is where experience actually touches: from it arise feeling, intention, and perception, and it is the pivotal link between the sense bases and the rest of mental life. It is one of the factors of name (mentality) and a central node in dependent origination."
