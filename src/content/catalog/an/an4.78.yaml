slug: an4.78
title: A Religious Donation
description: "The Buddha describes the four ways of purifying a religious donation—there’s a religious donation that’s purified by the giver, not the recipient, there’s a religious donation that’s purified by the recipient, not the giver, and there’s a religious donation that’s purified by neither the giver nor the recipient."
qualities: harm, wholesome, ethical conduct
theme: principle
