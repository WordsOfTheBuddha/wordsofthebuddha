slug: an2.230-279
title: The Chapter of Abbreviated Texts Beginning With the Unskillful
description: "The Buddha abbreviates repeated contrasts between unskillful and skillful qualities—blameworthy and blameless, leading to suffering or happiness—and culminates with freedom from anger and acrimony and the pair of conscience and fear of wrongdoing."
qualities: unwholesome, wholesome, suffering, happiness, conscience, fear of wrongdoing
theme: principle, cultivating discernment
