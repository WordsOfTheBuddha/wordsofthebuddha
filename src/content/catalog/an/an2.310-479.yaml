title: The Chapter of Abbreviated Texts Beginning with Greed
description: "The Buddha teaches that serenity and discernment should be developed for insight into and the complete understanding, giving up, and letting go of greed, hate, delusion, and other defilements—closing the Book of the Twos."
qualities: discernment, collectedness, giving up, greed, insight, wisdom
theme: training guideline, wisdom
