slug: an2.180-229
title: The Chapter of Abbreviated Texts Beginning With Anger
description: "The Buddha presents abbreviated pairs contrasting anger, disdain, jealousy, deceit, and lack of conscience with their wholesome opposites, showing how these qualities lead to suffering or happiness, decline or progress, and lower or higher rebirth."
qualities: anger, ill will, conscience, fear of wrongdoing, wholesome, unwholesome
theme: principle, urgency
