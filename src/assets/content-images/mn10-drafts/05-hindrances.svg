<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 240" width="920" height="240">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1528" /><stop offset="45%" stop-color="#0e1a30" /><stop offset="100%" stop-color="#101e36" />
    </linearGradient>
    <linearGradient id="tierGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c8a040" stop-opacity="0" /><stop offset="20%" stop-color="#c8a040" stop-opacity="0.5" />
      <stop offset="80%" stop-color="#c8a040" stop-opacity="0.5" /><stop offset="100%" stop-color="#c8a040" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="hindranceFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#201824" /><stop offset="100%" stop-color="#1a1420" />
    </linearGradient>
    <filter id="shadowDrop" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4" />
    </filter>
    <filter id="iconGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="b" />
      <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <rect width="920" height="240" fill="url(#bg)" />

  <!-- SECTION TITLE -->
  <text x="460" y="32" text-anchor="middle" fill="#c8a040"
    font-family="Georgia,'Times New Roman',serif" font-size="14" font-weight="bold"
    letter-spacing="2">4. OBSERVING THE MENTAL QUALITIES · dhammānupassanā</text>

  <!-- TIER LABEL -->
  <line x1="140" y1="34" x2="780" y2="34" stroke="url(#tierGrad)" stroke-width="0.4" opacity="0.3" />
  <text x="460" y="60" text-anchor="middle" fill="#c8a040"
    font-family="Georgia,'Times New Roman',serif" font-size="11" font-weight="bold"
    letter-spacing="2" opacity="0.7">4a. FIVE HINDRANCES · pañca nīvaraṇā</text>

  <!-- Discernment pattern -->
  <text x="460" y="82" text-anchor="middle"
    font-family="Georgia,'Times New Roman',serif" font-size="10">

    <tspan fill="#806828">
      Discerns when a hindrance is:
    </tspan>

    <tspan fill="#a0a0b8" dx="10">
      ① present
    </tspan>
    <tspan fill="#7888a0" font-style="italic">
      · atthi
    </tspan>

    <tspan fill="#a0a0b8" dx="10">
      ② absent
    </tspan>
    <tspan fill="#7888a0" font-style="italic">
      · natthi
    </tspan>

    <tspan fill="#a0a0b8" dx="10">
      ③ how unarisen hindrance arises
    </tspan>
    <tspan fill="#7888a0" font-style="italic">
      · yathā ca anuppannānaṁ nīvaraṇānaṁ uppādo hoti
    </tspan>

    <tspan x="460" dy="16" fill="#a0a0b8">
      ④ how arisen hindrance is abandoned
    </tspan>
    <tspan fill="#7888a0" font-style="italic">
      · yathā ca uppannānaṁ nīvaraṇānaṁ pahānaṁ hoti
    </tspan>

    <tspan fill="#a0a0b8" dx="10">
      ⑤ how abandoned hindrance does not arise again
    </tspan>
    <tspan fill="#7888a0" font-style="italic">
      · yathā ca pahīnassa nīvaraṇassa āyatiṁ anuppādo hoti
    </tspan>

  </text>

  <!-- 5 hindrances in a single row — w=152, gap=10 -->

  <!-- 1. Sensual Desire -->
  <g filter="url(#shadowDrop)">
    <rect x="60" y="114" width="152" height="100" rx="7" fill="url(#hindranceFill)" stroke="#a08090" stroke-width="0.6" stroke-opacity="0.3" />
  </g>
  <g transform="translate(136,140) scale(0.77363) translate(-10, -11)" opacity="0.50" filter="url(#iconGlow)">
    <path d="M 10 -2 C 10 -2, 2 8, 2 14 C 2 19, 6 24, 10 24 C 14 24, 18 19, 18 14 C 18 8, 10 -2, 10 -2 Z" fill="#e8604018" stroke="#e86040" stroke-width="1.3" stroke-linejoin="round" />
    <path d="M 10 8 C 10 8, 6 13, 6 16 C 6 18.5, 8 20, 10 20 C 12 20, 14 18.5, 14 16 C 14 13, 10 8, 10 8 Z" fill="#e8604028" stroke="#e86040" stroke-width="0.9" opacity="0.7" stroke-linejoin="round" />
  </g>
  <text x="136" y="166" text-anchor="middle" fill="#c8d8e8" font-family="Georgia,'Times New Roman',serif" font-size="10" font-weight="bold">Sensual Desire</text>
  <text x="136" y="182" text-anchor="middle" fill="#7888a0" font-family="Georgia,'Times New Roman',serif" font-size="9" font-style="italic">kāmacchanda</text>

  <!-- 2. Ill Will -->
  <g filter="url(#shadowDrop)">
    <rect x="222" y="114" width="152" height="100" rx="7" fill="url(#hindranceFill)" stroke="#a08090" stroke-width="0.6" stroke-opacity="0.3" />
  </g>
  <g transform="translate(298,140) scale(0.77363) translate(-22, -10)" opacity="0.50" filter="url(#iconGlow)">
    <path d="M 0 10 C 8 3, 16 17, 24 6 C 32 -2, 38 12, 44 8" fill="none" stroke="#a07058" stroke-width="1.2" stroke-linecap="round" />
    <path d="M 6 6 L 4 1 L 8 4" fill="none" stroke="#a07058" stroke-width="1" stroke-linejoin="round" />
    <path d="M 14 14 L 12 19 L 16 16" fill="none" stroke="#a07058" stroke-width="1" stroke-linejoin="round" />
    <path d="M 22 6 L 20 1 L 24 4" fill="none" stroke="#a07058" stroke-width="1" stroke-linejoin="round" />
    <path d="M 30 6 L 28 11 L 32 8" fill="none" stroke="#a07058" stroke-width="1" stroke-linejoin="round" />
    <path d="M 40 6 L 38 2 L 42 4" fill="none" stroke="#a07058" stroke-width="1" stroke-linejoin="round" />
  </g>
  <text x="298" y="166" text-anchor="middle" fill="#c8d8e8" font-family="Georgia,'Times New Roman',serif" font-size="10" font-weight="bold">Ill Will</text>
  <text x="298" y="182" text-anchor="middle" fill="#7888a0" font-family="Georgia,'Times New Roman',serif" font-size="9" font-style="italic">byāpāda</text>

  <!-- 3. Dullness & Drowsiness -->
  <g filter="url(#shadowDrop)">
    <rect x="384" y="114" width="152" height="100" rx="7" fill="url(#hindranceFill)" stroke="#a08090" stroke-width="0.6" stroke-opacity="0.3" />
  </g>
  <g transform="translate(460,142)" opacity="0.45" filter="url(#iconGlow)">
    <path d="M -8 2 Q -8 -4, -3 -4 Q -1 -8, 4 -6 Q 9 -6, 9 -1 Q 9 3, 4 3 Z" stroke="#7888a0" fill="none" stroke-width="1" stroke-linecap="round" />
    <line x1="-4" y1="6" x2="6" y2="6" stroke="#7888a0" stroke-width="0.7" stroke-linecap="round" opacity="0.5" />
  </g>
  <text x="460" y="166" text-anchor="middle" fill="#c8d8e8" font-family="Georgia,'Times New Roman',serif" font-size="10" font-weight="bold">Dullness &amp; Drowsiness</text>
  <text x="460" y="182" text-anchor="middle" fill="#7888a0" font-family="Georgia,'Times New Roman',serif" font-size="9" font-style="italic">thinamiddha</text>

  <!-- 4. Restlessness & Worry -->
  <g filter="url(#shadowDrop)">
    <rect x="546" y="114" width="152" height="100" rx="7" fill="url(#hindranceFill)" stroke="#a08090" stroke-width="0.6" stroke-opacity="0.3" />
  </g>
  <g transform="translate(622,142) scale(0.77363) translate(-14, -14.2768)" opacity="0.50" filter="url(#iconGlow)">
    <path d="M 0 12 Q 10 0, 20 14 Q 28 28, 12 22 Q -2 18, 10 8 Q 22 0, 28 16" fill="none" stroke="#a06070" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M 4 24 Q 14 16, 24 24" fill="none" stroke="#a06070" stroke-width="0.8" opacity="0.6" stroke-linecap="round"/>
  </g>
  <text x="622" y="166" text-anchor="middle" fill="#c8d8e8" font-family="Georgia,'Times New Roman',serif" font-size="9" font-weight="bold">Restlessness &amp; Worry</text>
  <text x="622" y="182" text-anchor="middle" fill="#7888a0" font-family="Georgia,'Times New Roman',serif" font-size="9" font-style="italic">uddhaccakukkucca</text>

  <!-- 5. Doubt -->
  <g filter="url(#shadowDrop)">
    <rect x="708" y="114" width="152" height="100" rx="7" fill="url(#hindranceFill)" stroke="#a08090" stroke-width="0.6" stroke-opacity="0.3" />
  </g>
  <g transform="translate(784,144)" opacity="0.45" filter="url(#iconGlow)">
    <path d="M -3 -6 C -3 -10, 5 -10, 5 -6 C 5 -3, 0 -3, 0 0" stroke="#a07060" fill="none" stroke-width="1.2" stroke-linecap="round" />
    <circle cx="0" cy="4" r="1.2" fill="#a07060" opacity="0.6" />
  </g>
  <text x="784" y="166" text-anchor="middle" fill="#c8d8e8" font-family="Georgia,'Times New Roman',serif" font-size="10" font-weight="bold">Doubt</text>
  <text x="784" y="182" text-anchor="middle" fill="#7888a0" font-family="Georgia,'Times New Roman',serif" font-size="9" font-style="italic">vicikicchā</text>
</svg>
