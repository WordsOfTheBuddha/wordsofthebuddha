<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" width="920" height="480">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1528" />
      <stop offset="100%" stop-color="#101e36" />
    </linearGradient>

    <linearGradient id="trackGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3a2028" /> <stop offset="50%" stop-color="#2a3545" /> <stop offset="100%" stop-color="#204038" /> </linearGradient>

    <filter id="shadowDrop" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4" />
    </filter>

    <filter id="knobGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="920" height="480" fill="url(#bg)" />

  <line x1="460" y1="95" x2="460" y2="455" stroke="#c8a040" stroke-width="0.5" opacity="0.15" stroke-dasharray="3 4"/>

  <text x="460" y="46" text-anchor="middle" fill="#c8a040" font-family="Georgia,'Times New Roman',serif" font-size="14" font-weight="bold" letter-spacing="2.5">
    3. OBSERVING THE MIND · cittānupassanā
  </text>
  <!-- Discernment pattern -->
  <text x="460" y="68" text-anchor="middle" fill="#806828"
    font-family="Georgia,'Times New Roman',serif" font-size="10">Dwells observing the mind in and of itself</text>

  <text x="460" y="90" text-anchor="middle" fill="#a0a0b8"
    font-family="Georgia,'Times New Roman',serif" font-size="9" font-style="italic">Discerns as it actually is — yathābhūtaṁ pajānāti</text>


  <text x="270" y="119" text-anchor="end" fill="#c8a0a8" font-family="Georgia,'Times New Roman',serif" font-size="13">
    With passion <tspan fill="#7888a0" font-style="italic">· sarāgaṁ cittaṁ</tspan>
  </text>
  <text x="650" y="119" text-anchor="start" fill="#a0c8b8" font-family="Georgia,'Times New Roman',serif" font-size="13">
    Free from passion <tspan fill="#7888a0" font-style="italic">· vītarāgaṁ cittaṁ</tspan>
  </text>
  <g filter="url(#shadowDrop)">
    <rect x="290" y="111" width="340" height="6" rx="3" fill="url(#trackGrad)" stroke="#405060" stroke-width="0.5" opacity="0.8"/>
  </g>
  <line x1="460" y1="111" x2="460" y2="117" stroke="#7888a0" stroke-width="0.5" opacity="0.4"/> <circle cx="320" cy="114" r="5.5" fill="#c8a040" stroke="#0b1528" stroke-width="1.5" filter="url(#knobGlow)"/>

  <text x="270" y="164" text-anchor="end" fill="#c8a0a8" font-family="Georgia,'Times New Roman',serif" font-size="13">
    With aversion <tspan fill="#7888a0" font-style="italic">· sadosaṁ cittaṁ</tspan>
  </text>
  <text x="650" y="164" text-anchor="start" fill="#a0c8b8" font-family="Georgia,'Times New Roman',serif" font-size="13">
    Free from aversion <tspan fill="#7888a0" font-style="italic">· vītadosaṁ cittaṁ</tspan>
  </text>
  <g filter="url(#shadowDrop)">
    <rect x="290" y="156" width="340" height="6" rx="3" fill="url(#trackGrad)" stroke="#405060" stroke-width="0.5" opacity="0.8"/>
  </g>
  <line x1="460" y1="156" x2="460" y2="162" stroke="#7888a0" stroke-width="0.5" opacity="0.4"/>
  <circle cx="610" cy="159" r="5.5" fill="#c8a040" stroke="#0b1528" stroke-width="1.5" filter="url(#knobGlow)"/>

  <text x="270" y="209" text-anchor="end" fill="#c8a0a8" font-family="Georgia,'Times New Roman',serif" font-size="13">
    Confused <tspan fill="#7888a0" font-style="italic">· samohaṁ cittaṁ</tspan>
  </text>
  <text x="650" y="209" text-anchor="start" fill="#a0c8b8" font-family="Georgia,'Times New Roman',serif" font-size="13">
    Free from confusion <tspan fill="#7888a0" font-style="italic">· vītamohaṁ cittaṁ</tspan>
  </text>
  <g filter="url(#shadowDrop)">
    <rect x="290" y="201" width="340" height="6" rx="3" fill="url(#trackGrad)" stroke="#405060" stroke-width="0.5" opacity="0.8"/>
  </g>
  <line x1="460" y1="201" x2="460" y2="207" stroke="#7888a0" stroke-width="0.5" opacity="0.4"/>
  <circle cx="380" cy="204" r="5.5" fill="#c8a040" stroke="#0b1528" stroke-width="1.5" filter="url(#knobGlow)"/>

  <text x="270" y="254" text-anchor="end" fill="#c8d8e8" font-family="Georgia,'Times New Roman',serif" font-size="13">
    Dull <tspan fill="#7888a0" font-style="italic">· saṅkhittaṁ cittaṁ</tspan>
  </text>
  <text x="650" y="254" text-anchor="start" fill="#c8d8e8" font-family="Georgia,'Times New Roman',serif" font-size="13">
    Scattered <tspan fill="#7888a0" font-style="italic">· vikkhittaṁ cittaṁ</tspan>
  </text>
  <g filter="url(#shadowDrop)">
    <rect x="290" y="246" width="340" height="6" rx="3" fill="url(#trackGrad)" stroke="#405060" stroke-width="0.5" opacity="0.8"/>
  </g>
  <line x1="460" y1="246" x2="460" y2="252" stroke="#7888a0" stroke-width="0.5" opacity="0.4"/>
  <circle cx="460" cy="249" r="5.5" fill="#c8a040" stroke="#0b1528" stroke-width="1.5" filter="url(#knobGlow)"/>

  <text x="270" y="299" text-anchor="end" fill="#c8a0a8" font-family="Georgia,'Times New Roman',serif" font-size="13">
    Not exalted <tspan fill="#7888a0" font-style="italic">· amahaggataṁ cittaṁ</tspan>
  </text>
  <text x="650" y="299" text-anchor="start" fill="#a0c8b8" font-family="Georgia,'Times New Roman',serif" font-size="13">
    Exalted <tspan fill="#7888a0" font-style="italic">· mahaggataṁ cittaṁ</tspan>
  </text>
  <g filter="url(#shadowDrop)">
    <rect x="290" y="291" width="340" height="6" rx="3" fill="url(#trackGrad)" stroke="#405060" stroke-width="0.5" opacity="0.8"/>
  </g>
  <line x1="460" y1="291" x2="460" y2="297" stroke="#7888a0" stroke-width="0.5" opacity="0.4"/>
  <circle cx="530" cy="294" r="5.5" fill="#c8a040" stroke="#0b1528" stroke-width="1.5" filter="url(#knobGlow)"/>

  <text x="270" y="344" text-anchor="end" fill="#c8a0a8" font-family="Georgia,'Times New Roman',serif" font-size="13">
    Inferior <tspan fill="#7888a0" font-style="italic">· sauttaraṁ cittaṁ</tspan>
  </text>
  <text x="650" y="344" text-anchor="start" fill="#a0c8b8" font-family="Georgia,'Times New Roman',serif" font-size="13">
    Unsurpassed <tspan fill="#7888a0" font-style="italic">· anuttaraṁ cittaṁ</tspan>
  </text>
  <g filter="url(#shadowDrop)">
    <rect x="290" y="336" width="340" height="6" rx="3" fill="url(#trackGrad)" stroke="#405060" stroke-width="0.5" opacity="0.8"/>
  </g>
  <line x1="460" y1="336" x2="460" y2="342" stroke="#7888a0" stroke-width="0.5" opacity="0.4"/>
  <circle cx="530" cy="339" r="5.5" fill="#c8a040" stroke="#0b1528" stroke-width="1.5" filter="url(#knobGlow)"/>

  <text x="270" y="389" text-anchor="end" fill="#c8a0a8" font-family="Georgia,'Times New Roman',serif" font-size="13">
    Distracted <tspan fill="#7888a0" font-style="italic">· asamāhitaṁ cittaṁ</tspan>
  </text>
  <text x="650" y="389" text-anchor="start" fill="#a0c8b8" font-family="Georgia,'Times New Roman',serif" font-size="13">
    Collected <tspan fill="#7888a0" font-style="italic">· samāhitaṁ cittaṁ</tspan>
  </text>
  <g filter="url(#shadowDrop)">
    <rect x="290" y="381" width="340" height="6" rx="3" fill="url(#trackGrad)" stroke="#405060" stroke-width="0.5" opacity="0.8"/>
  </g>
  <line x1="460" y1="381" x2="460" y2="387" stroke="#7888a0" stroke-width="0.5" opacity="0.4"/>
  <circle cx="600" cy="384" r="5.5" fill="#c8a040" stroke="#0b1528" stroke-width="1.5" filter="url(#knobGlow)"/>

  <text x="270" y="434" text-anchor="end" fill="#c8a0a8" font-family="Georgia,'Times New Roman',serif" font-size="13">
    Not liberated <tspan fill="#7888a0" font-style="italic">· avimuttaṁ cittaṁ</tspan>
  </text>
  <text x="650" y="434" text-anchor="start" fill="#a0c8b8" font-family="Georgia,'Times New Roman',serif" font-size="13">
    Liberated <tspan fill="#7888a0" font-style="italic">· vimuttaṁ cittaṁ</tspan>
  </text>
  <g filter="url(#shadowDrop)">
    <rect x="290" y="426" width="340" height="6" rx="3" fill="url(#trackGrad)" stroke="#405060" stroke-width="0.5" opacity="0.8"/>
  </g>
  <line x1="460" y1="426" x2="460" y2="432" stroke="#7888a0" stroke-width="0.5" opacity="0.4"/>
  <circle cx="430" cy="429" r="5.5" fill="#c8a040" stroke="#0b1528" stroke-width="1.5" filter="url(#knobGlow)"/>

</svg>
