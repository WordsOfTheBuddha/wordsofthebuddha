<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 310" width="920" height="310">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1528" /><stop offset="45%" stop-color="#0e1a30" /><stop offset="100%" stop-color="#101e36" />
    </linearGradient>
    <linearGradient id="tierGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c8a040" stop-opacity="0" /><stop offset="20%" stop-color="#c8a040" stop-opacity="0.5" />
      <stop offset="80%" stop-color="#c8a040" stop-opacity="0.5" /><stop offset="100%" stop-color="#c8a040" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="bodyFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c2840" /><stop offset="100%" stop-color="#1a2436" />
    </linearGradient>

    <filter id="shadowDrop" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4" />
    </filter>
    <filter id="iconGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="b" />
      <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <rect width="920" height="310" fill="url(#bg)" />
  <ellipse cx="460" cy="180" rx="320" ry="130" fill="#204050" opacity="0.04" />

  <!-- TIER LABEL -->
  <line x1="90" y1="14" x2="830" y2="14" stroke="url(#tierGrad)" stroke-width="0.6" opacity="0.45" />
  <text x="460" y="32" text-anchor="middle" fill="#c8a040"
    font-family="Georgia,'Times New Roman',serif" font-size="14" font-weight="bold"
    letter-spacing="2.5">1. OBSERVING THE BODY · kāyānupassanā</text>
  <text x="460" y="54" text-anchor="middle" fill="#806828"
    font-family="Georgia,'Times New Roman',serif" font-size="10">
    Dwells observing the body in and of itself
  </text>

  <!-- Row 1: Breathing | Postures | Clear Awareness -->
  <!-- 1.1 Breathing -->
  <g filter="url(#shadowDrop)">
    <rect x="60" y="76" width="260" height="110" rx="8" fill="url(#bodyFill)" stroke="#486878" stroke-width="0.8" stroke-opacity="0.4" />
  </g>
  <circle cx="82" cy="97" r="10" fill="none" stroke="#c8a040" stroke-width="0.8" opacity="0.6" />
  <text x="82" y="100" text-anchor="middle" fill="#c8a040" font-family="Georgia,'Times New Roman',serif" font-size="10">1</text>
  <text x="100" y="97" fill="#c8d8e8" font-family="Georgia,'Times New Roman',serif" font-size="11">Mindfulness while breathing</text>
  <text x="100" y="112" fill="#8898b0" font-family="Georgia,'Times New Roman',serif" font-size="10" font-style="italic">in and out · ānāpānapabba</text>
  <text x="76" y="137" fill="#607888" font-family="Georgia,'Times New Roman',serif" font-size="10">Breathes mindfully; discerns long and short breaths;</text>
  <text x="76" y="150" fill="#607888" font-family="Georgia,'Times New Roman',serif" font-size="10">trains to experience the whole body</text>
  <text x="76" y="163" fill="#607888" font-family="Georgia,'Times New Roman',serif" font-size="10">and settle bodily constructs.</text>
  <!-- breath icon (mn119-breath-torso) -->
  <g transform="translate(290,100) scale(0.67476) translate(0, 3.225)" opacity="0.50" filter="url(#iconGlow)">
    <g stroke="#78a0a0" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="0" cy="-14" r="3.2" stroke-width="1.3" />
      <path d="M -12 5 C -14 -4, -7 -7, 0 -7 C 7 -7, 14 -4, 12 5" stroke-width="1.3" />
      <path d="M -15 4 Q 0 13, 15 4" stroke-width="1.3" />
      <path d="M -4.5 0 C -4.5 -3.5, 0 -3.5, 0 0 C 0 3.5, 4.5 3.5, 4.5 0 C 4.5 -3.5, 0 -3.5, 0 0 C 0 3.5, -4.5 3.5, -4.5 0 Z" stroke-width="1" />
    </g>
  </g>

  <!-- 1.2 Postures -->
  <g filter="url(#shadowDrop)">
    <rect x="330" y="76" width="260" height="110" rx="8" fill="url(#bodyFill)" stroke="#486878" stroke-width="0.8" stroke-opacity="0.4" />
  </g>
  <circle cx="352" cy="97" r="10" fill="none" stroke="#c8a040" stroke-width="0.8" opacity="0.6" />
  <text x="352" y="100" text-anchor="middle" fill="#c8a040" font-family="Georgia,'Times New Roman',serif" font-size="10">2</text>
  <text x="370" y="97" fill="#c8d8e8" font-family="Georgia,'Times New Roman',serif" font-size="11" font-weight="bold">Postures</text>
  <text x="370" y="112" fill="#8898b0" font-family="Georgia,'Times New Roman',serif" font-size="10" font-style="italic">iriyāpathapabba</text>
  <text x="346" y="137" fill="#607888" font-family="Georgia,'Times New Roman',serif" font-size="10">Is aware of posture while walking, standing,</text>
  <text x="346" y="150" fill="#607888" font-family="Georgia,'Times New Roman',serif" font-size="10">sitting, or lying down. In whatever way the body</text>
  <text x="346" y="163" fill="#607888" font-family="Georgia,'Times New Roman',serif" font-size="10">is oriented, he discerns it accordingly.</text>
  <!-- postures icon (shared-postures-four) -->
  <g transform="translate(544,100) scale(0.67476) translate(-43, -15.75)" opacity="0.50" filter="url(#iconGlow)">
    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <g transform="translate(0,4)" stroke="#8090a0" stroke-width="0.8">
        <circle cx="5" cy="2" r="2.5" />
        <line x1="5" y1="5" x2="5" y2="16" />
        <line x1="5" y1="16" x2="1" y2="24" />
        <line x1="5" y1="16" x2="9" y2="24" />
        <line x1="5" y1="10" x2="0" y2="14" />
        <line x1="5" y1="10" x2="10" y2="8" />
      </g>
      <text x="16" y="20" fill="#506878" font-family="Georgia, Times New Roman, serif" font-size="10" opacity="0.5">&#x203A;</text>
      <g transform="translate(22,4)" stroke="#7888a0" stroke-width="0.8">
        <circle cx="5" cy="2" r="2.5" />
        <line x1="5" y1="5" x2="5" y2="16" />
        <line x1="5" y1="16" x2="3" y2="24" />
        <line x1="5" y1="16" x2="7" y2="24" />
        <line x1="5" y1="10" x2="1" y2="14" />
        <line x1="5" y1="10" x2="9" y2="14" />
      </g>
      <text x="37" y="20" fill="#506878" font-family="Georgia, Times New Roman, serif" font-size="10" opacity="0.5">&#x203A;</text>
      <g transform="translate(44,8)" stroke="#6880a0" stroke-width="0.8">
        <circle cx="5" cy="2" r="2.5" />
        <line x1="5" y1="5" x2="5" y2="12" />
        <line x1="5" y1="12" x2="10" y2="12" />
        <line x1="10" y1="12" x2="10" y2="20" />
        <line x1="5" y1="8" x2="1" y2="12" />
        <line x1="5" y1="8" x2="9" y2="6" />
      </g>
      <text x="59" y="20" fill="#506878" font-family="Georgia, Times New Roman, serif" font-size="10" opacity="0.5">&#x203A;</text>
      <g transform="translate(66,18)" stroke="#5878a0" stroke-width="0.8">
        <circle cx="4" cy="2" r="2.5" />
        <line x1="7" y1="2" x2="20" y2="2" />
        <line x1="14" y1="2" x2="18" y2="6" />
        <line x1="14" y1="2" x2="20" y2="4" />
      </g>
    </g>
  </g>

  <!-- 1.3 Clear Awareness -->
  <g filter="url(#shadowDrop)">
    <rect x="600" y="76" width="260" height="110" rx="8" fill="url(#bodyFill)" stroke="#486878" stroke-width="0.8" stroke-opacity="0.4" />
  </g>
  <circle cx="622" cy="97" r="10" fill="none" stroke="#c8a040" stroke-width="0.8" opacity="0.6" />
  <text x="622" y="99" text-anchor="middle" fill="#c8a040" font-family="Georgia,'Times New Roman',serif" font-size="10">3</text>
  <text x="640" y="97" fill="#c8d8e8" font-family="Georgia,'Times New Roman',serif" font-size="11">Acting with clear awareness</text>
  <text x="640" y="112" fill="#8898b0" font-family="Georgia,'Times New Roman',serif" font-size="10" font-style="italic">sampajānakārī</text>
  <text x="616" y="137" fill="#607888" font-family="Georgia,'Times New Roman',serif" font-size="10">Acts with clear awareness in all activities: going,</text>
  <text x="616" y="150" fill="#607888" font-family="Georgia,'Times New Roman',serif" font-size="9.5">returning, looking, bending, eating, dressing, drinking,</text>
  <text x="616" y="163" fill="#607888" font-family="Georgia,'Times New Roman',serif" font-size="9.5">defecating, urinating, speaking, and keeping silent.</text>
  <!-- clear awareness icon (mn119-clear-awareness-fourfold) -->
  <g transform="translate(828,104) scale(0.67476) translate(-21.95, -24)" opacity="0.50" filter="url(#iconGlow)">
    <g stroke-linecap="round" stroke-linejoin="round">
      <g opacity="0.65" stroke="#c8a040" fill="none" stroke-width="1">
        <path d="M 0 8 Q 8 0, 16 8" />
        <path d="M 0 8 Q 8 16, 16 8" />
        <circle cx="8" cy="8" r="2.5" stroke-width="0.8" />
      </g>
      <g transform="translate(30,0)" opacity="0.45" stroke="#7888a0" fill="none" stroke-width="1">
        <path d="M 12 2 Q 4 2, 4 10 Q 4 16, 8 16" />
        <path d="M 8 10 Q 10 8, 10 12" stroke-width="0.7" />
      </g>
      <g transform="translate(0,30)" opacity="0.45" stroke="#7888a0" fill="none" stroke-width="1">
        <path d="M 4 16 L 4 6 Q 4 2, 8 2 Q 12 2, 12 6 L 12 10" />
        <path d="M 12 8 Q 12 5, 15 5 Q 18 5, 18 8 L 18 12" stroke-width="0.7" />
        <line x1="4" y1="16" x2="18" y2="16" stroke-width="0.7" />
      </g>
      <g transform="translate(30,30)" opacity="0.45" stroke="#7888a0" fill="none" stroke-width="0.8">
        <circle cx="8" cy="10" r="6" />
        <circle cx="8" cy="10" r="2" fill="#7888a0" fill-opacity="0.3" stroke="none" />
        <path d="M 2 4 Q 8 0, 14 4" stroke-width="0.6" opacity="0.5" />
      </g>
    </g>
  </g>

  <!-- Row 2: Impurities | Elements | Charnel Grounds -->
  <!-- 1.4 Impurities -->
  <g filter="url(#shadowDrop)">
    <rect x="60" y="196" width="260" height="110" rx="8" fill="url(#bodyFill)" stroke="#486878" stroke-width="0.8" stroke-opacity="0.4" />
  </g>
  <circle cx="82" cy="217" r="10" fill="none" stroke="#c8a040" stroke-width="0.8" opacity="0.6" />
  <text x="82" y="219" text-anchor="middle" fill="#c8a040" font-family="Georgia,'Times New Roman',serif" font-size="10">4</text>
  <text x="100" y="217" fill="#c8d8e8" font-family="Georgia,'Times New Roman',serif" font-size="11">Reviewing impurities in the body</text>
  <text x="100" y="232" fill="#8898b0" font-family="Georgia,'Times New Roman',serif" font-size="10" font-style="italic">kāye asuci paccavekkhana</text>
  <text x="76" y="250" fill="#607888" font-family="Georgia,'Times New Roman',serif" font-size="9.5">Reviews the body from the soles upwards and hair</text>
  <text x="76" y="263" fill="#607888" font-family="Georgia,'Times New Roman',serif" font-size="9">downwards as full of various impurities: skin, flesh, sinews,</text>
  <text x="76" y="276" fill="#607888" font-family="Georgia,'Times New Roman',serif" font-size="9.5">bones, organs, stomach contents, fat, grease, and fluids.</text>
  <text x="76" y="293" fill="#6888a0" font-family="Georgia,'Times New Roman',serif" font-size="9" font-style="italic">Simile: bag with two openings full of many sorts of grains</text>
  <!-- impurities icon (mn119-body-impurities) -->
  <g transform="translate(290,217) scale(0.67476) translate(-1.45, 2.45)" opacity="0.50" filter="url(#iconGlow)">
    <g stroke="#78a0a0" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="1">
      <path d="M -10 -12 L -14 10 L 14 10 L 10 -12 Z" />
      <path d="M -8 -12 Q 0 -16 8 -12" stroke-width="0.8" />
      <circle cx="-4" cy="0" r="1.2" fill="#78a0a0" opacity="0.5" stroke="none" />
      <circle cx="3" cy="-3" r="1.2" fill="#78a0a0" opacity="0.5" stroke="none" />
      <circle cx="0" cy="4" r="1.2" fill="#78a0a0" opacity="0.5" stroke="none" />
      <circle cx="6" cy="2" r="1.2" fill="#78a0a0" opacity="0.5" stroke="none" />
      <circle cx="10" cy="-8" r="6" stroke-width="0.8" />
      <line x1="14" y1="-4" x2="17" y2="-1" stroke-width="0.8" />
      <circle cx="8" cy="-9" r="1" fill="#78a0a0" opacity="0.6" stroke="none" />
      <circle cx="12" cy="-8" r="1" fill="#78a0a0" opacity="0.6" stroke="none" />
    </g>
  </g>

  <!-- 1.5 Elements -->
  <g filter="url(#shadowDrop)">
    <rect x="330" y="196" width="260" height="110" rx="8" fill="url(#bodyFill)" stroke="#486878" stroke-width="0.8" stroke-opacity="0.4" />
  </g>
  <circle cx="352" cy="217" r="10" fill="none" stroke="#c8a040" stroke-width="0.8" opacity="0.6" />
  <text x="352" y="219" text-anchor="middle" fill="#c8a040" font-family="Georgia,'Times New Roman',serif" font-size="10">5</text>
  <text x="370" y="217" fill="#c8d8e8" font-family="Georgia,'Times New Roman',serif" font-size="11">Reviewing the elements in the body</text>
  <text x="370" y="232" fill="#8898b0" font-family="Georgia,'Times New Roman',serif" font-size="10" font-style="italic">kāye dhātu paccavekkhana</text>
  <text x="346" y="250" fill="#607888" font-family="Georgia,'Times New Roman',serif" font-size="10">Reviews the body, however positioned,</text>
  <text x="346" y="263" fill="#607888" font-family="Georgia,'Times New Roman',serif" font-size="10">in terms of the four elements:</text>
  <text x="346" y="276" fill="#607888" font-family="Georgia,'Times New Roman',serif" font-size="10">earth, water, fire, and wind.</text>
  <text x="346" y="293" fill="#6888a0" font-family="Georgia,'Times New Roman',serif" font-size="9" font-style="italic">like a butcher dividing a cow at a crossroads.</text>
  <!-- elements icon (mn119-four-elements) -->
  <g transform="translate(556,228) scale(0.67476) translate(-10.45, -3.5)" opacity="0.50" filter="url(#iconGlow)">
    <g stroke-linecap="round" stroke-linejoin="round">
      <g transform="translate(-22,0)" stroke="#7888a0" fill="none" stroke-width="0.8">
        <line x1="0" y1="0" x2="12" y2="0" />
        <line x1="1" y1="4" x2="11" y2="4" stroke-width="0.6" />
        <line x1="2" y1="8" x2="10" y2="8" stroke-width="0.4" />
      </g>
      <g transform="translate(-4,0)" stroke="#7888a0" fill="none">
        <path d="M 0 2 Q 3 -2 6 2 Q 9 6 12 2" stroke-width="0.8" />
        <path d="M 1 6 Q 4 2 7 6 Q 10 10 12 6" stroke-width="0.5" />
      </g>
      <g transform="translate(16,-2)" stroke="#c07060" fill="none" stroke-width="0.9">
        <path d="M 5 0 C 5 0, 1 5, 1 7 C 1 9, 3 11, 5 11 C 7 11, 9 9, 9 7 C 9 5, 5 0, 5 0 Z" />
        <path d="M 5 3 C 5 3, 3 6, 3 7.5 C 3 8.5, 4 9.5, 5 9.5 C 6 9.5, 7 8.5, 7 7.5 C 7 6, 5 3, 5 3 Z" stroke-width="0.5" opacity="0.6" />
      </g>
      <g transform="translate(32,0)" stroke="#7888a0" fill="none">
        <path d="M 0 2 Q 5 -2 10 2" stroke-width="0.8" />
        <path d="M 1 7 Q 6 3 11 7" stroke-width="0.6" />
      </g>
    </g>
  </g>

  <!-- 1.6 Charnel Grounds -->
  <g filter="url(#shadowDrop)">
    <rect x="600" y="196" width="260" height="110" rx="8" fill="url(#bodyFill)" stroke="#486878" stroke-width="0.8" stroke-opacity="0.4" />
  </g>
  <circle cx="622" cy="217" r="10" fill="none" stroke="#c8a040" stroke-width="0.8" opacity="0.6" />
  <text x="622" y="221" text-anchor="middle" fill="#c8a040" font-family="Georgia,'Times New Roman',serif" font-size="10">6</text>
  <text x="640" y="217" fill="#c8d8e8" font-family="Georgia,'Times New Roman',serif" font-size="11" font-weight="bold">Nine Charnel Grounds</text>
  <text x="640" y="232" fill="#8898b0" font-family="Georgia,'Times New Roman',serif" font-size="10" font-style="italic">nava sivathikā</text>
  <text x="616" y="250" fill="#607888" font-family="Georgia,'Times New Roman',serif" font-size="9.5">Compares the body to corpses</text>
  <text x="616" y="263" fill="#607888" font-family="Georgia,'Times New Roman',serif" font-size="9.5">in progressive decomposition, discerning</text>
  <text x="616" y="276" fill="#607888" font-family="Georgia,'Times New Roman',serif" font-size="9.5">‘This body too is of the same nature;’</text>
  <text x="616" y="289" fill="#607888" font-family="Georgia,'Times New Roman',serif" font-size="9.5">it will become like that.’</text>
  <!-- charnel grounds icon (mn119-charnel-skull) -->
  <g transform="translate(828,217) scale(0.67476) translate(-13.75, -17.6688)" opacity="0.50" filter="url(#iconGlow)">
    <g stroke="#78a0a0" stroke-width="1" fill="none" transform="scale(0.55)" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 10 15 C 5 0, 45 0, 40 15 C 45 25, 35 40, 25 40 C 15 40, 5 25, 10 15 Z" />
      <circle cx="18" cy="18" r="3" />
      <circle cx="32" cy="18" r="3" />
      <path d="M 25 26 L 25 30" />
      <path d="M 8 42 L 42 58 M 42 42 L 8 58" stroke-width="1.4" />
      <circle cx="8" cy="42" r="2.5" /><circle cx="42" cy="42" r="2.5" />
      <circle cx="8" cy="58" r="2.5" /><circle cx="42" cy="58" r="2.5" />
    </g>
  </g>



</svg>
