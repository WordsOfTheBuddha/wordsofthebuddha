<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 180" width="920" height="180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1528" /><stop offset="45%" stop-color="#0e1a30" /><stop offset="100%" stop-color="#101e36" />
    </linearGradient>
    <linearGradient id="tierGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c8a040" stop-opacity="0" /><stop offset="20%" stop-color="#c8a040" stop-opacity="0.5" />
      <stop offset="80%" stop-color="#c8a040" stop-opacity="0.5" /><stop offset="100%" stop-color="#c8a040" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="truthFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e2430" /><stop offset="100%" stop-color="#1a2028" />
    </linearGradient>
    <filter id="shadowDrop" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4" />
    </filter>
  </defs>

  <rect width="920" height="180" fill="url(#bg)" />

  <!-- TIER LABEL -->
  <line x1="140" y1="14" x2="780" y2="14" stroke="url(#tierGrad)" stroke-width="0.4" opacity="0.3" />
  <text x="460" y="30" text-anchor="middle" fill="#c8a040"
    font-family="Georgia,'Times New Roman',serif" font-size="11" font-weight="bold"
    letter-spacing="2" opacity="0.7">4e. FOUR NOBLE TRUTHS · cattāri ariyasaccāni</text>

  <!-- Discernment pattern -->
  <text x="460" y="52" text-anchor="middle" fill="#806828"
    font-family="Georgia,'Times New Roman',serif" font-size="10">Dwells observing the mental qualities in and of themselves with regard to the Four Noble Truths</text>

  <text x="460" y="68" text-anchor="middle" fill="#a0a0b8"
    font-family="Georgia,'Times New Roman',serif" font-size="9" font-style="italic">Discerns as it actually is — yathābhūtaṁ pajānāti</text>

  <!-- Discerns each as it actually is — yathābhūtaṁ pajānāti -->
  <!-- Four truths: 194×68, gap 8, starting x=60 -->

  <!-- 1. Suffering -->
  <g filter="url(#shadowDrop)">
    <rect x="60" y="84" width="194" height="68" rx="7" fill="url(#truthFill)" stroke="#c8a040" stroke-width="0.6" stroke-opacity="0.25" />
  </g>
  <circle cx="76" cy="105" r="8" fill="none" stroke="#c8a040" stroke-width="0.8" opacity="0.4" />
  <text x="76" y="108" text-anchor="middle" fill="#c8a040" font-family="Georgia,'Times New Roman',serif" font-size="10">1</text>
  <text x="100" y="106" fill="#c8d8e8" font-family="Georgia,'Times New Roman',serif" font-size="11" font-weight="bold">This is suffering</text>
  <text x="100" y="122" fill="#7888a0" font-family="Georgia,'Times New Roman',serif" font-size="10" font-style="italic">idaṁ dukkhaṁ</text>
  <text x="100" y="140" fill="#607888" font-family="Georgia,'Times New Roman',serif" font-size="9" font-style="italic">yathābhūtaṁ pajānāti</text>

  <!-- 2. Arising -->
  <g filter="url(#shadowDrop)">
    <rect x="262" y="84" width="194" height="68" rx="7" fill="url(#truthFill)" stroke="#c8a040" stroke-width="0.6" stroke-opacity="0.25" />
  </g>
  <circle cx="278" cy="105" r="8" fill="none" stroke="#c8a040" stroke-width="0.8" opacity="0.4" />
  <text x="278" y="108" text-anchor="middle" fill="#c8a040" font-family="Georgia,'Times New Roman',serif" font-size="10">2</text>
  <text x="298" y="106" fill="#c8d8e8" font-family="Georgia,'Times New Roman',serif" font-size="10" font-weight="bold">This is the arising of suffering</text>
  <text x="298" y="122" fill="#7888a0" font-family="Georgia,'Times New Roman',serif" font-size="10" font-style="italic">ayaṁ dukkhasamudayo</text>
  <text x="298" y="140" fill="#607888" font-family="Georgia,'Times New Roman',serif" font-size="9" font-style="italic">yathābhūtaṁ pajānāti</text>

  <!-- 3. End of Suffering -->
  <g filter="url(#shadowDrop)">
    <rect x="464" y="84" width="194" height="68" rx="7" fill="url(#truthFill)" stroke="#c8a040" stroke-width="0.6" stroke-opacity="0.25" />
  </g>
  <circle cx="480" cy="105" r="8" fill="none" stroke="#c8a040" stroke-width="0.8" opacity="0.4" />
  <text x="480" y="107" text-anchor="middle" fill="#c8a040" font-family="Georgia,'Times New Roman',serif" font-size="10">3</text>
  <text x="504" y="106" fill="#c8d8e8" font-family="Georgia,'Times New Roman',serif" font-size="10" font-weight="bold">This is the end of suffering</text>
  <text x="504" y="122" fill="#7888a0" font-family="Georgia,'Times New Roman',serif" font-size="10" font-style="italic">ayaṁ dukkhanirodho</text>
  <text x="504" y="140" fill="#607888" font-family="Georgia,'Times New Roman',serif" font-size="9" font-style="italic">yathābhūtaṁ pajānāti</text>

  <!-- 4. The Way -->
  <g filter="url(#shadowDrop)">
    <rect x="666" y="84" width="194" height="68" rx="7" fill="url(#truthFill)" stroke="#c8a040" stroke-width="0.6" stroke-opacity="0.25" />
  </g>
  <circle cx="682" cy="105" r="8" fill="none" stroke="#c8a040" stroke-width="0.8" opacity="0.4" />
  <text x="682" y="107" text-anchor="middle" fill="#c8a040" font-family="Georgia,'Times New Roman',serif" font-size="10">4</text>
  <text x="696" y="106" fill="#c8d8e8" font-family="Georgia,'Times New Roman',serif" font-size="10" font-weight="bold">The way to the end of suffering</text>
  <text x="696" y="122" fill="#7888a0" font-family="Georgia,'Times New Roman',serif" font-size="10" font-style="italic">dukkhanirodhagāminī paṭipadā</text>
  <text x="696" y="140" fill="#7888a0" font-family="Georgia,'Times New Roman',serif" font-size="9" font-style="italic">yathābhūtaṁ pajānāti</text>

</svg>
