<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" width="920" height="420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1528" /><stop offset="45%" stop-color="#0e1a30" /><stop offset="100%" stop-color="#101e36" />
    </linearGradient>
    <linearGradient id="tierGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c8a040" stop-opacity="0" /><stop offset="20%" stop-color="#c8a040" stop-opacity="0.5" />
      <stop offset="80%" stop-color="#c8a040" stop-opacity="0.5" /><stop offset="100%" stop-color="#c8a040" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="refrainFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141c28" /><stop offset="100%" stop-color="#101820" />
    </linearGradient>
    <linearGradient id="fruitFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e2820" /><stop offset="100%" stop-color="#1a241c" />
    </linearGradient>
    <linearGradient id="bojjhangaFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#182e34" /><stop offset="100%" stop-color="#14262c" />
    </linearGradient>
    <filter id="shadowDrop" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4" />
    </filter>
  </defs>

  <rect width="920" height="420" fill="url(#bg)" />

  <!-- ═══ THE REFRAIN ═══ -->
  <line x1="90" y1="14" x2="830" y2="14" stroke="url(#tierGrad)" stroke-width="0.6" opacity="0.45" />
  <text x="460" y="32" text-anchor="middle" fill="#c8a040"
    font-family="Georgia,'Times New Roman',serif" font-size="14" font-weight="bold"
    letter-spacing="2.5">DWELLS INDEPENDENTLY · anissito viharati</text>
  <text x="460" y="52" text-anchor="middle" fill="#806828"
    font-family="Georgia,'Times New Roman',serif" font-size="9.5" opacity="0.85">without clinging to anything in the world · <tspan font-size="9.5" opacity="0.65">na ca kiñci loke upādiyati</tspan></text>

  <g filter="url(#shadowDrop)">
    <rect x="200" y="64" width="520" height="96" rx="8" fill="url(#refrainFill)" stroke="#5a7898" stroke-width="0.6" stroke-opacity="0.3" />
  </g>

  <!-- Part 1 -->
  <circle cx="220" cy="82" r="8" fill="none" stroke="#c8a040" stroke-width="0.7" opacity="0.5" />
  <text x="220" y="85" text-anchor="middle" fill="#c8a040" font-family="Georgia,'Times New Roman',serif" font-size="10">1</text>
  <text x="460" y="82" text-anchor="middle" fill="#c8d8e8" font-family="Georgia,'Times New Roman',serif" font-size="10">Internally, externally, or both</text>
  <text x="460" y="95" text-anchor="middle" fill="#7888a0" font-family="Georgia,'Times New Roman',serif" font-size="9" font-style="italic">ajjhattaṁ · bahiddhā · ajjhattabahiddhā</text>

  <!-- Part 2 -->
  <circle cx="220" cy="112" r="8" fill="none" stroke="#c8a040" stroke-width="0.7" opacity="0.5" />
  <text x="220" y="115" text-anchor="middle" fill="#c8a040" font-family="Georgia,'Times New Roman',serif" font-size="10">2</text>
  <text x="460" y="112" text-anchor="middle" fill="#c8d8e8" font-family="Georgia,'Times New Roman',serif" font-size="10">Observing the arising nature, vanishing nature, or both</text>
  <text x="460" y="124" text-anchor="middle" fill="#7888a0" font-family="Georgia,'Times New Roman',serif" font-size="9" font-style="italic">samudayadhammānupassī · vayadhammānupassī · samudayavayadhammānupassī</text>

  <!-- Part 3 -->
  <circle cx="220" cy="140" r="8" fill="none" stroke="#c8a040" stroke-width="0.7" opacity="0.5" />
  <text x="220" y="142" text-anchor="middle" fill="#c8a040" font-family="Georgia,'Times New Roman',serif" font-size="10">3</text>
  <text x="460" y="140" text-anchor="middle" fill="#c8d8e8" font-family="Georgia,'Times New Roman',serif" font-size="10">With mindfulness established, dwells independent, and without clinging</text>
  <text x="460" y="151" text-anchor="middle" fill="#7888a0" font-family="Georgia,'Times New Roman',serif" font-size="9" font-style="italic">sati paccupaṭṭhitā · anissito ca viharati · na ca kiñci loke upādiyati</text>

  <!-- ═══ THE FRUITS ═══ -->
  <line x1="90" y1="168" x2="830" y2="168" stroke="url(#tierGrad)" stroke-width="0.6" opacity="0.45" />
  <text x="460" y="186" text-anchor="middle" fill="#c8a040"
    font-family="Georgia,'Times New Roman',serif" font-size="12" font-weight="bold"
    letter-spacing="2.5" opacity="0.75">THE FRUITS · phalāni</text>

  <g filter="url(#shadowDrop)">
    <rect x="200" y="196" width="520" height="40" rx="8" fill="url(#fruitFill)" stroke="#c8a040" stroke-width="0.6" stroke-opacity="0.2" />
  </g>
  <text x="460" y="212" text-anchor="middle" fill="#c8a040"
    font-family="Georgia,'Times New Roman',serif" font-size="11" font-style="italic">Whoever develops and cultivates these four satipaṭṭhāna,</text>
  <text x="460" y="226" text-anchor="middle" fill="#c8a040"
    font-family="Georgia,'Times New Roman',serif" font-size="11" font-style="italic">one of two fruits may be expected, in as little as seven days ... months ... years:</text>

  <!-- Two outcomes -->
  <g filter="url(#shadowDrop)">
    <rect x="250" y="244" width="180" height="26" rx="8" fill="url(#bojjhangaFill)" stroke="#60a088" stroke-width="0.7" stroke-opacity="0.4" />
  </g>
  <text x="340" y="261" text-anchor="middle" fill="#a0d0b8" font-family="Georgia,'Times New Roman',serif" font-size="11" font-weight="bold">Final Knowledge · <tspan fill="#6888a0" font-size="9" font-style="italic">aññā</tspan></text>

  <g filter="url(#shadowDrop)">
    <rect x="490" y="244" width="180" height="26" rx="8" fill="url(#bojjhangaFill)" stroke="#60a088" stroke-width="0.7" stroke-opacity="0.4" />
  </g>
  <text x="580" y="261" text-anchor="middle" fill="#a0d0b8" font-family="Georgia,'Times New Roman',serif" font-size="11" font-weight="bold">Non-returning · <tspan fill="#6888a0" font-size="9" font-style="italic">anāgāmitā</tspan></text>

  <!-- ═══ THE DIRECT WAY ═══ -->
  <line x1="90" y1="284" x2="830" y2="284" stroke="url(#tierGrad)" stroke-width="0.6" opacity="0.45" />
  <text x="460" y="302" text-anchor="middle" fill="#c8a040"
    font-family="Georgia,'Times New Roman',serif" font-size="12" font-weight="bold"
    letter-spacing="2.5" opacity="0.75">"THE DIRECT WAY" · ekāyano maggo</text>
  <text x="460" y="318" text-anchor="middle" fill="#a0b0c8"
    font-family="Georgia,'Times New Roman',serif" font-size="10" font-style="italic" opacity="0.7">"This is the direct way, bhikkhus, for…"</text>

  <!-- 5 purposes: 148×34, gap 8, start x=74 -->

  <!-- 1. Purification -->
  <g filter="url(#shadowDrop)">
    <rect x="74" y="330" width="148" height="34" rx="6" fill="url(#fruitFill)" stroke="#c8a040" stroke-width="0.5" stroke-opacity="0.2" />
  </g>
  <circle cx="88" cy="341" r="7" fill="none" stroke="#c8a040" stroke-width="0.6" opacity="0.4" />
  <text x="88" y="343" text-anchor="middle" fill="#c8a040" font-family="Georgia,'Times New Roman',serif" font-size="8">1</text>
  <text x="108" y="344" fill="#c8d8e8" font-family="Georgia,'Times New Roman',serif" font-size="9.5">Purification of beings</text>
  <text x="148" y="358" text-anchor="middle" fill="#7888a0" font-family="Georgia,'Times New Roman',serif" font-size="8" font-style="italic">sattānaṁ visuddhiyā</text>

  <!-- 2. Overcoming of sorrow -->
  <g filter="url(#shadowDrop)">
    <rect x="230" y="330" width="148" height="34" rx="6" fill="url(#fruitFill)" stroke="#c8a040" stroke-width="0.5" stroke-opacity="0.2" />
  </g>
  <circle cx="244" cy="341" r="7" fill="none" stroke="#c8a040" stroke-width="0.6" opacity="0.4" />
  <text x="244" y="343" text-anchor="middle" fill="#c8a040" font-family="Georgia,'Times New Roman',serif" font-size="8">2</text>
  <text x="258" y="344" fill="#c8d8e8" font-family="Georgia,'Times New Roman',serif" font-size="9.5">Overcoming of sorrow</text>
  <text x="304" y="358" text-anchor="middle" fill="#7888a0" font-family="Georgia,'Times New Roman',serif" font-size="8" font-style="italic">sokaparidevānaṁ samatikkamāya</text>

  <!-- 3. End of pain -->
  <g filter="url(#shadowDrop)">
    <rect x="386" y="330" width="148" height="34" rx="6" fill="url(#fruitFill)" stroke="#c8a040" stroke-width="0.5" stroke-opacity="0.2" />
  </g>
  <circle cx="400" cy="341" r="7" fill="none" stroke="#c8a040" stroke-width="0.6" opacity="0.4" />
  <text x="400" y="343" text-anchor="middle" fill="#c8a040" font-family="Georgia,'Times New Roman',serif" font-size="8">3</text>
  <text x="414" y="344" fill="#c8d8e8" font-family="Georgia,'Times New Roman',serif" font-size="9.5">Subsiding of distress</text>
  <text x="460" y="358" text-anchor="middle" fill="#7888a0" font-family="Georgia,'Times New Roman',serif" font-size="8" font-style="italic">dukkhadomanassānaṁ atthaṅgamāya</text>

  <!-- 4. Right method -->
  <g filter="url(#shadowDrop)">
    <rect x="542" y="330" width="148" height="34" rx="6" fill="url(#fruitFill)" stroke="#c8a040" stroke-width="0.5" stroke-opacity="0.2" />
  </g>
  <circle cx="556" cy="341" r="7" fill="none" stroke="#c8a040" stroke-width="0.6" opacity="0.4" />
  <text x="556" y="343" text-anchor="middle" fill="#c8a040" font-family="Georgia,'Times New Roman',serif" font-size="8">4</text>
  <text x="570" y="344" fill="#c8d8e8" font-family="Georgia,'Times New Roman',serif" font-size="9.5">Attainment of right path</text>
  <text x="616" y="358" text-anchor="middle" fill="#7888a0" font-family="Georgia,'Times New Roman',serif" font-size="8" font-style="italic">ñāyassa adhigamāya</text>

  <!-- 5. Nibbāna -->
  <g filter="url(#shadowDrop)">
    <rect x="698" y="330" width="148" height="34" rx="6" fill="url(#fruitFill)" stroke="#c8a040" stroke-width="0.5" stroke-opacity="0.2" />
  </g>
  <circle cx="712" cy="341" r="7" fill="none" stroke="#c8a040" stroke-width="0.6" opacity="0.4" />
  <text x="712" y="343" text-anchor="middle" fill="#c8a040" font-family="Georgia,'Times New Roman',serif" font-size="8">5</text>
  <text x="726" y="344" fill="#c8d8e8" font-family="Georgia,'Times New Roman',serif" font-size="9.5">Realization of Nibbāna</text>
  <text x="772" y="358" text-anchor="middle" fill="#7888a0" font-family="Georgia,'Times New Roman',serif" font-size="8" font-style="italic">nibbānassa sacchikiriyāya</text>

  <!-- ═══ FOOTER ═══ -->
  <line x1="300" y1="378" x2="620" y2="378" stroke="#304058" stroke-opacity="0.3" stroke-width="0.5" />
  <a href="https://wordsofthebuddha.org/mn10" target="_blank" rel="noopener noreferrer">
    <text x="460" y="394" text-anchor="middle" fill="#485840"
      font-family="Georgia,'Times New Roman',serif" font-size="10" letter-spacing="1">wordsofthebuddha.org/mn10</text>
  </a>
  <g transform="translate(460, 410) scale(0.25)" fill="none" stroke="#8a9ab0" stroke-width="2.5" opacity="0.18">
    <path d="M 0 -22 C 14 -8 14 12 0 18 C -14 12 -14 -8 0 -22 Z" transform="translate(-14, 16) rotate(-65)" />
    <path d="M 0 -22 C 14 -8 14 12 0 18 C -14 12 -14 -8 0 -22 Z" transform="translate(14, 16) rotate(65)" />
    <path d="M 0 -22 C 14 -8 14 12 0 18 C -14 12 -14 -8 0 -22 Z" transform="translate(-9, 0) rotate(-25)" />
    <path d="M 0 -22 C 14 -8 14 12 0 18 C -14 12 -14 -8 0 -22 Z" transform="translate(9, 0) rotate(25)" />
    <circle cx="0" cy="-28" r="9" />
  </g>

</svg>
