<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 340" width="920" height="340">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1528" /><stop offset="45%" stop-color="#0e1a30" /><stop offset="100%" stop-color="#101e36" />
    </linearGradient>
    <linearGradient id="tierGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c8a040" stop-opacity="0" /><stop offset="20%" stop-color="#c8a040" stop-opacity="0.5" />
      <stop offset="80%" stop-color="#c8a040" stop-opacity="0.5" /><stop offset="100%" stop-color="#c8a040" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="bodyFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c2840" /><stop offset="100%" stop-color="#1a2436" />
    </linearGradient>
    <linearGradient id="feelFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#142a32" /><stop offset="100%" stop-color="#10242c" />
    </linearGradient>
    <linearGradient id="dhammaFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b2938" /><stop offset="100%" stop-color="#14202d" />
    </linearGradient>
    <filter id="shadowDrop" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4" />
    </filter>
    <filter id="iconGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="b" />
      <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <!-- BACKGROUND -->
  <rect width="920" height="340" fill="url(#bg)" />
  <ellipse cx="460" cy="170" rx="300" ry="120" fill="#204050" opacity="0.04" />

  <!-- TITLE BLOCK -->
  <text x="460" y="44" text-anchor="middle" fill="#c8a040"
    font-family="Georgia,'Times New Roman',serif" font-size="22" font-weight="bold"
    letter-spacing="3">MN 10 — SATIPAṬṬHĀNASUTTA</text>
  <text x="460" y="68" text-anchor="middle" fill="#708090"
    font-family="Georgia,'Times New Roman',serif" font-size="15" font-style="italic"
    letter-spacing="1">Establishments of Mindfulness</text>
  <line x1="260" y1="84" x2="660" y2="84" stroke="#a09070" stroke-opacity="0.3" stroke-width="0.6" />

  <!-- Opening quote -->
  <text x="460" y="112" text-anchor="middle" fill="#90c0b0"
    font-family="Georgia,'Times New Roman',serif" font-size="12" font-style="italic">This is the direct way for the purification of beings, for the overcoming of sorrow and lamentation,</text>
  <text x="460" y="128" text-anchor="middle" fill="#90c0b0"
    font-family="Georgia,'Times New Roman',serif" font-size="12" font-style="italic">for the subsiding of discomfort and distress, for the attainment of the right path, for the realization of Nibbāna</text>
  <text x="460" y="148" text-anchor="middle" fill="#708878"
    font-family="Georgia,'Times New Roman',serif" font-size="11" font-style="italic" opacity="0.8">ekāyano ayaṁ bhikkhave maggo sattānaṁ visuddhiyā … nibbānassa sacchikiriyāya</text>

  <!-- FOUR ESTABLISHMENTS LABEL -->
  <line x1="90" y1="172" x2="830" y2="172" stroke="url(#tierGrad)" stroke-width="0.6" opacity="0.45" />
  <text x="460" y="192" text-anchor="middle" fill="#a0b0c8"
    font-family="Georgia,'Times New Roman',serif" font-size="11" font-weight="bold" opacity="0.8"
    letter-spacing="1.5">FOUR ESTABLISHMENTS OF MINDFULNESS · cattāro satipaṭṭhānā</text>

  <!-- Foundation 1: Body -->
  <g filter="url(#shadowDrop)">
    <rect x="60" y="210" width="190" height="84" rx="8" fill="url(#bodyFill)" stroke="#486878" stroke-width="0.8" stroke-opacity="0.45" />
  </g>
  <g transform="translate(95,244)" opacity="0.55" filter="url(#iconGlow)">
    <g stroke="#78a0a0" fill="none" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="0" cy="-7" r="3.5" />
      <path d="M -6 -1 L 6 -1" />
      <path d="M 0 -3 L 0 6" />
      <path d="M -5 5 L 0 9 L 5 5" />
    </g>
  </g>
  <text x="155" y="244" text-anchor="middle" fill="#c8d8e8" font-family="Georgia,'Times New Roman',serif" font-size="12" font-weight="bold">Body</text>
  <text x="155" y="260" text-anchor="middle" fill="#8898b0" font-family="Georgia,'Times New Roman',serif" font-size="10" font-style="italic">kāyānupassanā</text>
  <text x="155" y="280" text-anchor="middle" fill="#607888" font-family="Georgia,'Times New Roman',serif" font-size="9">6 ways to contemplate</text>

  <!-- Foundation 2: Felt Experience -->
  <g filter="url(#shadowDrop)">
    <rect x="265" y="210" width="190" height="84" rx="8" fill="url(#feelFill)" stroke="#486878" stroke-width="0.8" stroke-opacity="0.45" />
  </g>
  <g transform="translate(290,244)" opacity="0.55" filter="url(#iconGlow)">
    <g stroke="#78a0a0" fill="none" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 0 7 C -8 -3 -9 -7 -4 -8 C -1.5 -8.5 0 -7 0 -7 C 0 -7 1.5 -8.5 4 -8 C 9 -7 8 -3 0 7 Z" />
    </g>
  </g>
  <text x="360" y="244" text-anchor="middle" fill="#c8d8e8" font-family="Georgia,'Times New Roman',serif" font-size="12" font-weight="bold">Felt Experience</text>
  <text x="360" y="260" text-anchor="middle" fill="#8898b0" font-family="Georgia,'Times New Roman',serif" font-size="10" font-style="italic">vedanānupassanā</text>
  <text x="360" y="280" text-anchor="middle" fill="#607888" font-family="Georgia,'Times New Roman',serif" font-size="9"><tspan dy="-1">3</tspan> <tspan dy="1">distinct feelings of 2 kinds</tspan></text>

  <!-- Foundation 3: Mind -->
  <g filter="url(#shadowDrop)">
    <rect x="470" y="210" width="190" height="84" rx="8" fill="url(#dhammaFill)" stroke="#486878" stroke-width="0.8" stroke-opacity="0.45" />
  </g>
  <g transform="translate(495,244)" opacity="0.55" filter="url(#iconGlow)">
    <g stroke="#78a0a0" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="0" cy="0" r="9" />
      <circle cx="0" cy="0" r="3" />
    </g>
  </g>
  <text x="565" y="244" text-anchor="middle" fill="#c8d8e8" font-family="Georgia,'Times New Roman',serif" font-size="12" font-weight="bold">Mind</text>
  <text x="565" y="260" text-anchor="middle" fill="#8898b0" font-family="Georgia,'Times New Roman',serif" font-size="10" font-style="italic">cittānupassanā</text>
  <text x="565" y="280" text-anchor="middle" fill="#607888" font-family="Georgia,'Times New Roman',serif" font-size="9">16 mind-states</text>

  <!-- Foundation 4: Mental Qualities -->
  <g filter="url(#shadowDrop)">
    <rect x="675" y="210" width="190" height="84" rx="8" fill="url(#dhammaFill)" stroke="#486878" stroke-width="0.8" stroke-opacity="0.45" />
  </g>
  <g transform="translate(700,244)" opacity="0.55" filter="url(#iconGlow)">
    <g stroke="#78a0a0" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="0.9">
      <circle cx="0" cy="0" r="9" />
      <circle cx="0" cy="0" r="2" />
      <path d="M 0 -9 L 0 -3 M 0 3 L 0 9 M -9 0 L -3 0 M 3 0 L 9 0" />
      <path d="M -6.4 -6.4 L -2.1 -2.1 M 2.1 2.1 L 6.4 6.4 M 6.4 -6.4 L 2.1 -2.1 M -2.1 2.1 L -6.4 6.4" />
    </g>
  </g>
  <text x="770" y="244" text-anchor="middle" fill="#c8d8e8" font-family="Georgia,'Times New Roman',serif" font-size="12" font-weight="bold">Mental Qualities</text>
  <text x="770" y="260" text-anchor="middle" fill="#8898b0" font-family="Georgia,'Times New Roman',serif" font-size="10" font-style="italic">dhammānupassanā</text>
  <text x="770" y="280" text-anchor="middle" fill="#607888" font-family="Georgia,'Times New Roman',serif" font-size="9"><tspan dy="-1">5</tspan> <tspan dy="1"> ways to contemplate</tspan></text>

  <!-- Shared formula -->
  <text x="460" y="316" text-anchor="middle" fill="#8090a0"
    font-family="Georgia,'Times New Roman',serif" font-size="10" font-style="italic" opacity="0.75">With continuous effort, clearly aware and being present, having removed craving and distress with regard to the world</text>
  <text x="460" y="332" text-anchor="middle" fill="#607888"
    font-family="Georgia,'Times New Roman',serif" font-size="10" font-style="italic" opacity="0.7">ātāpī sampajāno satimā, vineyya loke abhijjhādomanassaṁ</text>

</svg>
