<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 1080" width="920" height="1080">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#0b1528" />
            <stop offset="45%" stop-color="#0e1a30" />
            <stop offset="100%" stop-color="#101e36" />
        </linearGradient>
        <radialGradient id="libGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#ffd700" stop-opacity="0.55" />
            <stop offset="30%" stop-color="#ffd700" stop-opacity="0.15" />
            <stop offset="65%" stop-color="#daa520" stop-opacity="0.05" />
            <stop offset="100%" stop-color="#ffd700" stop-opacity="0" />
        </radialGradient>
        <linearGradient id="diagonalGuide" x1="0" y1="1" x2="1" y2="0">
            <stop offset="0%" stop-color="#4a6888" stop-opacity="0.15" />
            <stop offset="100%" stop-color="#c8a840" stop-opacity="0.4" />
        </linearGradient>
        <filter id="glow1" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="3" result="b" />
            <feMerge>
                <feMergeNode in="b" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="6" result="b" />
            <feMerge>
                <feMergeNode in="b" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <filter id="shadowDrop" x="-10%" y="-10%" width="130%" height="130%">
            <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4" />
        </filter>
        <linearGradient id="stg1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1c2840" /><stop offset="100%" stop-color="#162036" /></linearGradient>
        <linearGradient id="stg2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1e2c3c" /><stop offset="100%" stop-color="#182432" /></linearGradient>
        <linearGradient id="stg3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#20302e" /><stop offset="100%" stop-color="#1a2828" /></linearGradient>
        <linearGradient id="stg4" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#253228" /><stop offset="100%" stop-color="#1f2a22" /></linearGradient>
        <linearGradient id="stg5" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2a3223" /><stop offset="100%" stop-color="#242a1d" /></linearGradient>
        <linearGradient id="stg6" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2f321e" /><stop offset="100%" stop-color="#292a18" /></linearGradient>
        <linearGradient id="stg7" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#35301a" /><stop offset="100%" stop-color="#2d2814" /></linearGradient>
        <linearGradient id="stg8" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#3c2e18" /><stop offset="100%" stop-color="#342612" /></linearGradient>
        <linearGradient id="foundGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#1a2848" stop-opacity="0" />
            <stop offset="8%" stop-color="#1a2848" />
            <stop offset="92%" stop-color="#1a2848" />
            <stop offset="100%" stop-color="#1a2848" stop-opacity="0" />
        </linearGradient>
    </defs>

    <rect width="920" height="1080" fill="url(#bg)" />

    <g opacity="0.025" stroke="#ffffff" stroke-width="0.6">
        <line x1="0" y1="1040" x2="900" y2="80" />
        <line x1="60" y1="1060" x2="920" y2="100" />
    </g>

    <text x="460" y="40" text-anchor="middle" fill="#d8c8a0" font-family="Georgia,'Times New Roman',serif" font-size="22" font-weight="bold" letter-spacing="3">MN 107 - GAṆAKAMOGGALLĀNA SUTTA</text>
    <text x="460" y="64" text-anchor="middle" fill="#a09070" font-family="Georgia,'Times New Roman',serif" font-size="15" font-style="italic" letter-spacing="1">Gradual training, gradual practice, gradual progression</text>
    <line x1="255" y1="78" x2="665" y2="78" stroke="#a09070" stroke-opacity="0.3" stroke-width="0.6" />
    <text x="460" y="100" text-anchor="middle" fill="#6d7d96" font-family="Georgia,'Times New Roman',serif" font-size="13" font-style="italic">anupubbasikkhā anupubbakiriyā anupubbapaṭipadā</text>

    <line x1="145" y1="913" x2="760" y2="218" stroke="url(#diagonalGuide)" stroke-width="1.2" stroke-dasharray="3,8" opacity="0.3" />

    <g filter="url(#shadowDrop)"><rect x="36" y="886" width="220" height="52" rx="9" fill="url(#stg1)" stroke="#3a5878" stroke-width="1" stroke-opacity="0.55" /></g>
    <circle cx="57" cy="911" r="10" fill="none" stroke="#4a7090" stroke-width="1" opacity="0.65" />
    <text x="57" y="910" text-anchor="middle" dominant-baseline="central" fill="#5a80a0" font-family="Georgia,'Times New Roman',serif" font-size="10.5" font-weight="bold">1</text>
    <text x="146" y="907" text-anchor="middle" fill="#a0b8d0" font-family="Georgia,'Times New Roman',serif" font-size="13.5" font-weight="bold">Virtuous Conduct</text>
    <text x="146" y="926" text-anchor="middle" fill="#607890" font-family="Georgia,'Times New Roman',serif" font-size="12.5" font-style="italic">sīla - pātimokkha</text>
    <circle cx="32" cy="914" r="2.5" fill="#a0b8d0" opacity="0.12" filter="url(#glow1)" />

    <g filter="url(#shadowDrop)"><rect x="112" y="794" width="220" height="52" rx="9" fill="url(#stg2)" stroke="#3e5a78" stroke-width="1" stroke-opacity="0.55" /></g>
    <circle cx="133" cy="821" r="10" fill="none" stroke="#4e7290" stroke-width="1" opacity="0.65" />
    <text x="133" y="820" text-anchor="middle" dominant-baseline="central" fill="#5e82a8" font-family="Georgia,'Times New Roman',serif" font-size="10.5" font-weight="bold">2</text>
    <text x="222" y="817" text-anchor="middle" fill="#a8bcc4" font-family="Georgia,'Times New Roman',serif" font-size="13.5" font-weight="bold">Sense Restraint</text>
    <text x="222" y="836" text-anchor="middle" fill="#688090" font-family="Georgia,'Times New Roman',serif" font-size="12.5" font-style="italic">indriyesu guttadvāro</text>
    <circle cx="108" cy="824" r="2.5" fill="#a8bcc4" opacity="0.13" filter="url(#glow1)" />

    <g filter="url(#shadowDrop)"><rect x="188" y="704" width="220" height="52" rx="9" fill="url(#stg3)" stroke="#426070" stroke-width="1" stroke-opacity="0.55" /></g>
    <circle cx="209" cy="731" r="10" fill="none" stroke="#527880" stroke-width="1" opacity="0.65" />
    <text x="209" y="730" text-anchor="middle" dominant-baseline="central" fill="#628898" font-family="Georgia,'Times New Roman',serif" font-size="10.5" font-weight="bold">3</text>
    <text x="298" y="727" text-anchor="middle" fill="#b0bcb8" font-family="Georgia,'Times New Roman',serif" font-size="13.5" font-weight="bold">Moderation in Eating</text>
    <text x="298" y="746" text-anchor="middle" fill="#708888" font-family="Georgia,'Times New Roman',serif" font-size="12.5" font-style="italic">bhojane mattaññū</text>
    <circle cx="184" cy="734" r="2.5" fill="#b0bcb8" opacity="0.14" filter="url(#glow1)" />

    <g filter="url(#shadowDrop)"><rect x="264" y="614" width="220" height="58" rx="9" fill="url(#stg4)" stroke="#487068" stroke-width="1" stroke-opacity="0.55" /></g>
    <circle cx="285" cy="644" r="10" fill="none" stroke="#587878" stroke-width="1" opacity="0.65" />
    <text x="285" y="643" text-anchor="middle" dominant-baseline="central" fill="#688888" font-family="Georgia,'Times New Roman',serif" font-size="10.5" font-weight="bold">4</text>
    <text x="374" y="633" text-anchor="middle" fill="#b8bcac" font-family="Georgia,'Times New Roman',serif" font-size="12.5" font-weight="bold">Dedication to</text>
    <text x="374" y="648" text-anchor="middle" fill="#b8bcac" font-family="Georgia,'Times New Roman',serif" font-size="12.5" font-weight="bold">Wakefulness</text>
    <text x="374" y="665" text-anchor="middle" fill="#788880" font-family="Georgia,'Times New Roman',serif" font-size="12.5" font-style="italic">jāgariyaṁ anuyutto</text>
    <circle cx="260" cy="647" r="2.5" fill="#b8bcac" opacity="0.15" filter="url(#glow1)" />

    <g filter="url(#shadowDrop)"><rect x="340" y="524" width="220" height="58" rx="9" fill="url(#stg5)" stroke="#4e7060" stroke-width="1" stroke-opacity="0.55" /></g>
    <circle cx="361" cy="555" r="10" fill="none" stroke="#5e8070" stroke-width="1" opacity="0.65" />
    <text x="361" y="554" text-anchor="middle" dominant-baseline="central" fill="#6e9080" font-family="Georgia,'Times New Roman',serif" font-size="10.5" font-weight="bold">5</text>
    <text x="450" y="541" text-anchor="middle" fill="#bfc0a0" font-family="Georgia,'Times New Roman',serif" font-size="12" font-weight="bold">Clear Present Moment</text>
    <text x="450" y="556" text-anchor="middle" fill="#bfc0a0" font-family="Georgia,'Times New Roman',serif" font-size="12" font-weight="bold">Awareness</text>
    <text x="450" y="573" text-anchor="middle" fill="#808878" font-family="Georgia,'Times New Roman',serif" font-size="12.5" font-style="italic">satisampajañña</text>
    <circle cx="336" cy="558" r="2.5" fill="#bfc0a0" opacity="0.15" filter="url(#glow1)" />

    <g filter="url(#shadowDrop)"><rect x="416" y="434" width="220" height="52" rx="9" fill="url(#stg6)" stroke="#567058" stroke-width="1" stroke-opacity="0.56" /></g>
    <circle cx="437" cy="461" r="10" fill="none" stroke="#668068" stroke-width="1" opacity="0.65" />
    <text x="437" y="461" text-anchor="middle" dominant-baseline="central" fill="#769070" font-family="Georgia,'Times New Roman',serif" font-size="10.5" font-weight="bold">6</text>
    <text x="526" y="457" text-anchor="middle" fill="#c4be98" font-family="Georgia,'Times New Roman',serif" font-size="13.5" font-weight="bold">Seclusion</text>
    <text x="526" y="476" text-anchor="middle" fill="#888870" font-family="Georgia,'Times New Roman',serif" font-size="12.5" font-style="italic">vivittaṁ senāsanaṁ</text>
    <circle cx="412" cy="464" r="2.5" fill="#c4be98" opacity="0.16" filter="url(#glow1)" />

    <g filter="url(#shadowDrop)"><rect x="492" y="344" width="220" height="58" rx="9" fill="url(#stg7)" stroke="#606848" stroke-width="1" stroke-opacity="0.56" /></g>
    <circle cx="513" cy="374" r="10" fill="none" stroke="#707858" stroke-width="1" opacity="0.65" />
    <text x="513" y="373" text-anchor="middle" dominant-baseline="central" fill="#808860" font-family="Georgia,'Times New Roman',serif" font-size="10.5" font-weight="bold">7</text>
    <text x="602" y="362" text-anchor="middle" fill="#c8b888" font-family="Georgia,'Times New Roman',serif" font-size="12" font-weight="bold">Abandoning the</text>
    <text x="602" y="377" text-anchor="middle" fill="#c8b888" font-family="Georgia,'Times New Roman',serif" font-size="12" font-weight="bold">Five Hindrances</text>
    <text x="602" y="394" text-anchor="middle" fill="#909068" font-family="Georgia,'Times New Roman',serif" font-size="12.5" font-style="italic">pañca nīvaraṇe pahāya</text>
    <circle cx="488" cy="377" r="2.5" fill="#c8b888" opacity="0.17" filter="url(#glow1)" />

    <g filter="url(#shadowDrop)"><rect x="568" y="254" width="220" height="52" rx="9" fill="url(#stg8)" stroke="#6a6040" stroke-width="1" stroke-opacity="0.57" /></g>
    <circle cx="589" cy="281" r="10" fill="none" stroke="#7a7050" stroke-width="1" opacity="0.65" />
    <text x="589" y="281" text-anchor="middle" dominant-baseline="central" fill="#8a8058" font-family="Georgia,'Times New Roman',serif" font-size="10.5" font-weight="bold">8</text>
    <text x="678" y="277" text-anchor="middle" fill="#ccb078" font-family="Georgia,'Times New Roman',serif" font-size="13.5" font-weight="bold">Dwell in the Jhānas</text>
    <text x="678" y="296" text-anchor="middle" fill="#989060" font-family="Georgia,'Times New Roman',serif" font-size="12.5" font-style="italic">cattāro jhānā</text>
    <circle cx="564" cy="284" r="2.5" fill="#ccb078" opacity="0.18" filter="url(#glow1)" />

    <ellipse cx="768" cy="156" rx="150" ry="102" fill="url(#libGlow)" />
    <g opacity="0.22" filter="url(#glow2)">
        <line x1="768" y1="156" x2="768" y2="92" stroke="#ffd700" stroke-width="1.2" />
        <line x1="768" y1="156" x2="700" y2="110" stroke="#ffd700" stroke-width="1" />
        <line x1="768" y1="156" x2="836" y2="110" stroke="#ffd700" stroke-width="1" />
        <line x1="768" y1="156" x2="670" y2="134" stroke="#ffd700" stroke-width="0.8" />
        <line x1="768" y1="156" x2="866" y2="134" stroke="#ffd700" stroke-width="0.8" />
        <line x1="768" y1="156" x2="648" y2="156" stroke="#ffd700" stroke-width="0.7" />
        <line x1="768" y1="156" x2="888" y2="156" stroke="#ffd700" stroke-width="0.7" />
        <line x1="768" y1="156" x2="686" y2="116" stroke="#ffd700" stroke-width="0.6" />
        <line x1="768" y1="156" x2="850" y2="116" stroke="#ffd700" stroke-width="0.6" />
    </g>
    <circle cx="768" cy="156" r="56" fill="none" stroke="#ffd700" stroke-width="1.4" stroke-opacity="0.35" filter="url(#glow2)" />
    <circle cx="768" cy="156" r="42" fill="#ffd700" fill-opacity="0.07" stroke="#ffd700" stroke-width="1.8" stroke-opacity="0.7" filter="url(#glow1)" />
    <text x="768" y="152" text-anchor="middle" fill="#ffd700" font-family="Georgia,'Times New Roman',serif" font-size="14" letter-spacing="2" filter="url(#glow1)">NIBBANA</text>
    <text x="768" y="170" text-anchor="middle" fill="#c8a040" font-family="Georgia,'Times New Roman',serif" font-size="12.5" font-style="italic">nibbāna</text>

    <rect x="40" y="962" width="840" height="82" rx="10" fill="url(#foundGrad)" stroke="#3a5070" stroke-width="0.8" stroke-opacity="0.5" />
    <text x="460" y="985" text-anchor="middle" fill="#6f87aa" font-family="Georgia,'Times New Roman',serif" font-size="12" letter-spacing="2">GRADUAL TRAINING SIMILE</text>
    <text x="460" y="1009" text-anchor="middle" fill="#a7b7d0" font-family="Georgia,'Times New Roman',serif" font-size="13" font-style="italic">“Just as a skilled horse‑trainer, having obtained a fine thoroughbred colt, first trains it to wear the bit …</text>
    <text x="460" y="1029" text-anchor="middle" fill="#9aaecb" font-family="Georgia,'Times New Roman',serif" font-size="12.5" font-style="italic">… so too the Tathāgata, having obtained a person to be trained, teaches a gradual training step by step.”</text>

    <g opacity="0.55">
        <rect x="26" y="378" width="214" height="114" rx="6" fill="#0e1a2e" stroke="#3a5068" stroke-width="0.7" stroke-opacity="0.5" />
        <text x="133" y="401" text-anchor="middle" fill="#62799a" font-family="Georgia,'Times New Roman',serif" font-size="11.5" letter-spacing="1">ACCOUNTANT</text>
        <text x="133" y="417" text-anchor="middle" fill="#62799a" font-family="Georgia,'Times New Roman',serif" font-size="11.5" letter-spacing="1">MOGGALLANA ASKS</text>
        <line x1="46" y1="428" x2="220" y2="428" stroke="#405868" stroke-opacity="0.4" stroke-width="0.5" />
        <text x="133" y="452" text-anchor="middle" fill="#9bacc0" font-family="Georgia,'Times New Roman',serif" font-size="12.5" font-style="italic">“Can a gradual training be</text>
        <text x="133" y="471" text-anchor="middle" fill="#9bacc0" font-family="Georgia,'Times New Roman',serif" font-size="12.5" font-style="italic">shown in this Dhamma and Vinaya?”</text>
    </g>

    <g opacity="0.52">
        <rect x="664" y="520" width="216" height="118" rx="6" fill="#0e1a2e" stroke="#3a4838" stroke-width="0.7" stroke-opacity="0.5" />
        <text x="772" y="544" text-anchor="middle" fill="#68848b" font-family="Georgia,'Times New Roman',serif" font-size="11.5" letter-spacing="1">THE BUDDHA'S RESPONSE</text>
        <line x1="684" y1="554" x2="860" y2="554" stroke="#405858" stroke-opacity="0.4" stroke-width="0.5" />
        <text x="772" y="578" text-anchor="middle" fill="#9dafbb" font-family="Georgia,'Times New Roman',serif" font-size="13" font-style="italic">“Step-by-step training</text>
        <text x="772" y="597" text-anchor="middle" fill="#9dafbb" font-family="Georgia,'Times New Roman',serif" font-size="13" font-style="italic">starting with virtuous conduct</text>
        <text x="772" y="617" text-anchor="middle" fill="#9dafbb" font-family="Georgia,'Times New Roman',serif" font-size="13" font-style="italic">all the way to dwelling in jhānas.”</text>
    </g>

    <circle cx="32" cy="914" r="3" fill="#a0b8d0" opacity="0.10" filter="url(#glow1)" />
    <circle cx="108" cy="824" r="3" fill="#a8bcc4" opacity="0.11" filter="url(#glow1)" />
    <circle cx="184" cy="734" r="3" fill="#b0bcb8" opacity="0.12" filter="url(#glow1)" />
    <circle cx="260" cy="647" r="3" fill="#b8bcac" opacity="0.13" filter="url(#glow1)" />
    <circle cx="336" cy="558" r="3" fill="#bfc0a0" opacity="0.14" filter="url(#glow1)" />
    <circle cx="412" cy="464" r="3" fill="#c4be98" opacity="0.15" filter="url(#glow1)" />
    <circle cx="488" cy="377" r="3" fill="#c8b888" opacity="0.16" filter="url(#glow1)" />
    <circle cx="564" cy="284" r="3" fill="#ccb078" opacity="0.17" filter="url(#glow1)" />

    <line x1="280" y1="1056" x2="640" y2="1056" stroke="#304058" stroke-opacity="0.3" stroke-width="0.5" />
    <text x="460" y="1072" text-anchor="middle" fill="#384858" font-family="Georgia,'Times New Roman',serif" font-size="9.5" letter-spacing="1">Majjhima Nikāya 107</text>
</svg>
