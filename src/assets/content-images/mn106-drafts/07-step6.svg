<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 160" width="920" height="160">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1528" /><stop offset="50%" stop-color="#0e1a30" /><stop offset="100%" stop-color="#101e36" />
    </linearGradient>
    <linearGradient id="stg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e2e30" /><stop offset="100%" stop-color="#1a282c" />
    </linearGradient>
    <filter id="shadowDrop" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4" />
    </filter>
    <filter id="iconGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="b" />
      <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <rect width="920" height="160" fill="url(#bg)" />

  <!-- Sub-tier label -->
  <text x="460" y="14" text-anchor="middle" fill="#5a8878" opacity="0.6"
    font-family="Georgia,'Times New Roman',serif" font-size="10" letter-spacing="1.5">3RD WAY</text>

  <!-- Card 6 -->
  <g filter="url(#shadowDrop)">
    <rect x="190" y="24" width="540" height="130" rx="8" fill="url(#stg2)" stroke="#5a8878" stroke-width="0.8" stroke-opacity="0.4" />
  </g>

  <!-- Loop arc: dwell thus often -->
  <path d="M 208 45 L 208 140 A 9 9 0 0 0 226 140 L 226 38 A 9 9 0 0 0 208 38 Z"
    fill="none" stroke="#5a8878" stroke-width="0.5" opacity="0.25" />
  <polygon points="204,45 212,45 208,37" fill="#5a8878" opacity="0.25" />
  <text x="206" y="91" fill="#5a8878" opacity="0.8"
    font-family="Georgia,'Times New Roman',serif" font-size="8" letter-spacing="1.2"
    transform="rotate(-90 206 91)" text-anchor="middle">dwell thus often</text>
  <text x="228" y="91" fill="#5a8878" opacity="0.6"
    font-family="Georgia,'Times New Roman',serif" font-size="8" letter-spacing="0.8" font-style="italic"
    transform="rotate(-90 224 91)" text-anchor="middle">tabbahulavihārī</text>

  <!-- Contemplation -->
  <text x="460" y="46" text-anchor="middle" fill="#b0c0d0"
    font-family="Georgia,'Times New Roman',serif" font-size="12" font-weight="bold">"I do not belong to anyone anywhere"</text>
  <text x="460" y="62" text-anchor="middle" fill="#7898a8"
    font-family="Georgia,'Times New Roman',serif" font-size="10" font-style="italic">nāhaṁ kvacani kassaci kiñcanatasmiṁ</text>
  <text x="460" y="80" text-anchor="middle" fill="#607888"
    font-family="Georgia,'Times New Roman',serif" font-size="10">"Nor does anything anywhere belong to me"</text>
  <text x="460" y="96" text-anchor="middle" fill="#607888"
    font-family="Georgia,'Times New Roman',serif" font-size="10" font-style="italic">na ca mama kvacani kismiñci kiñcanaṁ natthī</text>

  <!-- Divider -->
  <line x1="250" y1="110" x2="670" y2="110" stroke="#5a8878" stroke-width="0.3" stroke-dasharray="3,4" opacity="0.25" />

  <!-- Confidence -->
  <text x="460" y="126" text-anchor="middle" fill="#607888"
    font-family="Georgia,'Times New Roman',serif" font-size="10">When the mind acquires confidence · he attains to the base of nothingness</text>
  <text x="460" y="142" text-anchor="middle" fill="#607888"
    font-family="Georgia,'Times New Roman',serif" font-size="10" font-style="italic">āyatane cittaṁ pasīdati · ākiñcaññāyatanaṁ samāpajjati</text>

  <!-- Non-belonging icon: unconnected dot, dispersed lines -->
  <g transform="translate(668, 36)" opacity="0.6" filter="url(#iconGlow)">
    <g transform="scale(2)">
      <circle cx="12" cy="12" r="2.5" fill="#60a088" fill-opacity="0.15" stroke="#60a088" stroke-width="0.6" />
      <!-- Dispersed lines radiating outward, unconnected -->
      <line x1="4" y1="4" x2="1" y2="1" stroke="#60a088" stroke-width="0.4" opacity="0.3" />
      <line x1="20" y1="4" x2="23" y2="1" stroke="#60a088" stroke-width="0.4" opacity="0.3" />
      <line x1="4" y1="20" x2="1" y2="23" stroke="#60a088" stroke-width="0.4" opacity="0.3" />
      <line x1="20" y1="20" x2="23" y2="23" stroke="#60a088" stroke-width="0.4" opacity="0.3" />
    </g>
  </g>
</svg>
