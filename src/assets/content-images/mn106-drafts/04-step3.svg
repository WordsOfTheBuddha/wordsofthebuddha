<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 170" width="920" height="170">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1528" /><stop offset="50%" stop-color="#0e1a30" /><stop offset="100%" stop-color="#101e36" />
    </linearGradient>
    <linearGradient id="stg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c2840" /><stop offset="100%" stop-color="#182236" />
    </linearGradient>
    <filter id="shadowDrop" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4" />
    </filter>
    <filter id="iconGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="b" />
      <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <rect width="920" height="170" fill="url(#bg)" />

  <!-- Sub-tier label -->
  <text x="460" y="14" text-anchor="middle" fill="#5a7898" opacity="0.6"
    font-family="Georgia,'Times New Roman',serif" font-size="10" letter-spacing="1.5">3RD WAY</text>

  <!-- Card 3 -->
  <g filter="url(#shadowDrop)">
    <rect x="160" y="24" width="600" height="140" rx="8" fill="url(#stg1)" stroke="#5a7898" stroke-width="0.8" stroke-opacity="0.4" />
  </g>

  <!-- Loop arc: dwell thus often / tabbahulavihārī -->
  <path d="M 178 45 L 178 135 A 9 9 0 0 0 196 135 L 196 38 A 9 9 0 0 0 178 38 Z"
    fill="none" stroke="#5a7898" stroke-width="0.5" opacity="0.25" />
  <polygon points="174,45 182,45 178,37" fill="#5a7898" opacity="0.25" />
  <text x="176" y="96" fill="#5a7898" opacity="0.8"
    font-family="Georgia,'Times New Roman',serif" font-size="8" letter-spacing="1.2"
    transform="rotate(-90 176 96)" text-anchor="middle">dwell thus often</text>
  <text x="198" y="96" fill="#5a7898" opacity="0.6"
    font-family="Georgia,'Times New Roman',serif" font-size="8" letter-spacing="0.8" font-style="italic"
    transform="rotate(-90 194 96)" text-anchor="middle">tabbahulavihārī</text>

  <!-- Contemplation -->
  <text x="460" y="44" text-anchor="middle" fill="#b0c0d0"
    font-family="Georgia,'Times New Roman',serif" font-size="12" font-weight="bold">Sensuality, forms, and their perceptions — both are impermanent</text>
  <text x="460" y="60" text-anchor="middle" fill="#7898a8"
    font-family="Georgia,'Times New Roman',serif" font-size="10" font-style="italic">kāmā, kāmasaññā, rūpā, rūpasaññā — ubhayametaṁ aniccaṁ</text>
  <text x="460" y="80" text-anchor="middle" fill="#607888"
    font-family="Georgia,'Times New Roman',serif" font-size="10">What is impermanent is not worth delighting in, not worth welcoming, not worth clinging to</text>
  <text x="460" y="96" text-anchor="middle" fill="#607888"
    font-family="Georgia,'Times New Roman',serif" font-size="10" font-style="italic">yadiccaṁ taṁ nālaṁ abhinandituṁ, nālaṁ abhivadituṁ, nālaṁ ajjhosituṁ</text>

  <!-- Divider -->
  <line x1="220" y1="110" x2="700" y2="110" stroke="#5a7898" stroke-width="0.3" stroke-dasharray="3,4" opacity="0.25" />

  <!-- Confidence -->
  <text x="460" y="128" text-anchor="middle" fill="#607888"
    font-family="Georgia,'Times New Roman',serif" font-size="10">When the mind acquires confidence · he attains to the imperturbable</text>
  <text x="460" y="144" text-anchor="middle" fill="#607888"
    font-family="Georgia,'Times New Roman',serif" font-size="10" font-style="italic">āyatane cittaṁ pasīdati · āneñjaṁ samāpajjati</text>

  <!-- Impermanence icon -->
  <g transform="translate(700, 36)" opacity="0.6" filter="url(#iconGlow)">
    <g transform="scale(2)">
      <g transform="translate(0, 0)">
        <!-- Solid half-arc on left -->
        <path d="M 12 2 A 10 10 0 0 0 12 22" fill="none" stroke="#7898b0" stroke-width="0.8" />
        <!-- Dashed half-arc on right, fading -->
        <path d="M 12 22 A 10 10 0 0 0 12 2" fill="none" stroke="#7898b0" stroke-width="0.6" stroke-dasharray="2,3" opacity="0.4" />
        <!-- Small particles drifting right -->
        <circle cx="20" cy="8" r="1" fill="#7898b0" opacity="0.3" />
        <circle cx="22" cy="14" r="0.7" fill="#7898b0" opacity="0.2" />
        <circle cx="19" cy="18" r="0.8" fill="#7898b0" opacity="0.25" />
      </g>
    </g>
  </g>
</svg>
