<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 120" width="920" height="120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1528" /><stop offset="50%" stop-color="#0e1a30" /><stop offset="100%" stop-color="#101e36" />
    </linearGradient>
    <filter id="shadowDrop" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4" />
    </filter>
  </defs>

  <rect width="920" height="120" fill="url(#bg)" />

  <!-- Closing exhortation -->
  <g filter="url(#shadowDrop)">
    <rect x="120" y="14" width="680" height="50" rx="6" fill="#131820" fill-opacity="0.6" stroke="#60a088" stroke-width="0.5" stroke-opacity="0.3" />
  </g>
  <text x="460" y="35" text-anchor="middle" fill="#90c0b0"
    font-family="Georgia,'Times New Roman',serif" font-size="11" font-style="italic">"Meditate, Ānanda, do not be negligent; lest you later regret it."</text>
  <text x="460" y="51" text-anchor="middle" fill="#7888a0"
    font-family="Georgia,'Times New Roman',serif" font-size="10" font-style="italic">jhāyathānanda, mā pamādattha, mā pacchā vippaṭisārino ahuvattha</text>

  <!-- Footer rule -->
  <line x1="300" y1="76" x2="620" y2="76" stroke="#304058" stroke-width="0.5" stroke-opacity="0.3" />

  <!-- URL link -->
  <a href="https://wordsofthebuddha.org/mn106" target="_blank" rel="noopener noreferrer">
    <text x="460" y="92" text-anchor="middle" fill="#485840"
      font-family="Georgia,'Times New Roman',serif" font-size="10" letter-spacing="1">wordsofthebuddha.org/mn106</text>
  </a>

  <!-- Tiny lotus motif -->
  <g transform="translate(460, 108) scale(0.25)" fill="none" stroke="#8a9ab0" stroke-width="2.5" opacity="0.18">
    <path d="M 0 -22 C 14 -8 14 12 0 18 C -14 12 -14 -8 0 -22 Z" transform="translate(-14, 16) rotate(-65)" />
    <path d="M 0 -22 C 14 -8 14 12 0 18 C -14 12 -14 -8 0 -22 Z" transform="translate(14, 16) rotate(65)" />
    <path d="M 0 -22 C 14 -8 14 12 0 18 C -14 12 -14 -8 0 -22 Z" transform="translate(-9, 0) rotate(-25)" />
    <path d="M 0 -22 C 14 -8 14 12 0 18 C -14 12 -14 -8 0 -22 Z" transform="translate(9, 0) rotate(25)" />
    <circle cx="0" cy="-28" r="9" />
  </g>
</svg>
