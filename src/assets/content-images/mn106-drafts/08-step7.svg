<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 195" width="920" height="195">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1528" /><stop offset="50%" stop-color="#0e1a30" /><stop offset="100%" stop-color="#101e36" />
    </linearGradient>
    <linearGradient id="tierGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c8a040" stop-opacity="0" /><stop offset="20%" stop-color="#c8a040" stop-opacity="0.5" />
      <stop offset="80%" stop-color="#c8a040" stop-opacity="0.5" /><stop offset="100%" stop-color="#c8a040" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="stg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a2e24" /><stop offset="100%" stop-color="#242c1e" />
    </linearGradient>
    <filter id="shadowDrop" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4" />
    </filter>
    <filter id="iconGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="b" />
      <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <rect width="920" height="195" fill="url(#bg)" />

  <!-- Tier heading -->
  <line x1="220" y1="14" x2="700" y2="14" stroke="url(#tierGrad)" stroke-width="0.5" />
  <text x="460" y="46" text-anchor="middle" fill="#c8a040" opacity="0.75"
    font-family="Georgia,'Times New Roman',serif" font-size="11" font-weight="bold"
    letter-spacing="2">CONDUCIVE TO NEITHER PERCEPTION NOR NON-PERCEPTION · nevasaññānāsaññāyatana</text>

  <!-- Card 7 -->
  <g filter="url(#shadowDrop)">
    <rect x="180" y="58" width="560" height="130" rx="8" fill="url(#stg3)" stroke="#8a8868" stroke-width="0.8" stroke-opacity="0.4" />
  </g>

  <!-- Loop arc: dwell thus often -->
  <path d="M 198 79 L 198 174 A 9 9 0 0 0 216 174 L 216 72 A 9 9 0 0 0 198 72 Z"
    fill="none" stroke="#8a8868" stroke-width="0.5" opacity="0.25" />
  <polygon points="194,79 202,79 198,71" fill="#8a8868" opacity="0.25" />
  <text x="196" y="125" fill="#8a8868" opacity="0.8"
    font-family="Georgia,'Times New Roman',serif" font-size="8" letter-spacing="1.2"
    transform="rotate(-90 196 125)" text-anchor="middle">dwell thus often</text>
  <text x="218" y="125" fill="#8a8868" opacity="0.6"
    font-family="Georgia,'Times New Roman',serif" font-size="8" letter-spacing="0.8" font-style="italic"
    transform="rotate(-90 214 125)" text-anchor="middle">tabbahulavihārī</text>

  <!-- Contemplation -->
  <text x="460" y="80" text-anchor="middle" fill="#b0c0d0"
    font-family="Georgia,'Times New Roman',serif" font-size="12" font-weight="bold">... and the perception of the base of nothingness — all these are perceptions</text>
  <text x="460" y="96" text-anchor="middle" fill="#7898a8"
    font-family="Georgia,'Times New Roman',serif" font-size="10" font-style="italic">kāmā, rūpā, yā ca āneñjasaññā, yā ca ākiñcaññāyatanasaññā — sabbā saññā</text>
  <text x="460" y="114" text-anchor="middle" fill="#607888"
    font-family="Georgia,'Times New Roman',serif" font-size="10">Where they cease without remainder, that is peaceful, that is sublime</text>
  <text x="460" y="130" text-anchor="middle" fill="#607888"
    font-family="Georgia,'Times New Roman',serif" font-size="10" font-style="italic">aparisesā nirujjhanti etaṁ santaṁ etaṁ paṇītaṁ</text>

  <!-- Divider -->
  <line x1="240" y1="144" x2="680" y2="144" stroke="#8a8868" stroke-width="0.3" stroke-dasharray="3,4" opacity="0.25" />

  <!-- Confidence -->
  <text x="460" y="160" text-anchor="middle" fill="#607888"
    font-family="Georgia,'Times New Roman',serif" font-size="10">When the mind acquires confidence · he attains to the base of neither perception nor non-perception</text>
  <text x="460" y="176" text-anchor="middle" fill="#607888"
    font-family="Georgia,'Times New Roman',serif" font-size="10" font-style="italic">āyatane cittaṁ pasīdati · nevasaññānāsaññāyatanaṁ samāpajjati</text>

  <!-- Neither-base icon (dual rings) -->
  <g transform="translate(686, 64)" opacity="0.6" filter="url(#iconGlow)">
    <g transform="scale(2)">
      <g transform="translate(12, 12) scale(1.45655) translate(-10, -10)">
        <circle cx="10" cy="10" r="7" fill="none" stroke="#7888a0" stroke-width="0.5" opacity="0.5" />
        <circle cx="10" cy="10" r="7" fill="none" stroke="#7888a0" stroke-width="0.3" stroke-dasharray="1,3" />
      </g>
    </g>
  </g>
</svg>
