    <text x="460" y="1336" text-anchor="middle" fill="#d8c8a0" font-family="Georgia,'Times New Roman',serif" font-size="13" opacity="0.9">He who is endowed with this Noble Eightfold Path</text>
    <text x="460" y="1358" text-anchor="middle" fill="#e8d8b0" font-family="Georgia,'Times New Roman',serif" font-size="14" font-weight="bold" letter-spacing="0.5">is called a stream-enterer,</text>
    <text x="460" y="1380" text-anchor="middle" fill="#b09870" font-family="Georgia,'Times New Roman',serif" font-size="11">this venerable one of such name and such family lineage.</text>
    <text x="460" y="1410" text-anchor="middle" fill="#806840" font-family="Georgia,'Times New Roman',serif" font-size="10" font-style="italic">yo iminā ariyena aṭṭhaṅgikena maggena samannāgato ayaṁ vuccati sotāpanno,</text>
    <text x="460" y="1426" text-anchor="middle" fill="#806840" font-family="Georgia,'Times New Roman',serif" font-size="10" font-style="italic">svāyaṁ āyasmā evaṁnāmo evaṅgotto.</text>


