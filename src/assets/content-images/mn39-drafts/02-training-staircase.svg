<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 780" width="920" height="780">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1528" /><stop offset="50%" stop-color="#0e1a30" /><stop offset="100%" stop-color="#101e36" />
    </linearGradient>
    <linearGradient id="stg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c2840" /><stop offset="100%" stop-color="#1a2436" />
    </linearGradient>
    <linearGradient id="stg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d2a3e" /><stop offset="100%" stop-color="#1b2638" />
    </linearGradient>
    <linearGradient id="stg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e2c3c" /><stop offset="100%" stop-color="#1c2838" />
    </linearGradient>
    <linearGradient id="stg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f2e38" /><stop offset="100%" stop-color="#1d2a34" />
    </linearGradient>
    <linearGradient id="stg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#202e32" /><stop offset="100%" stop-color="#1e2c2e" />
    </linearGradient>
    <linearGradient id="stg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22302e" /><stop offset="100%" stop-color="#1e2c2a" />
    </linearGradient>
    <linearGradient id="stg7" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#253228" /><stop offset="100%" stop-color="#222e26" />
    </linearGradient>
    <linearGradient id="tierGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c8a040" stop-opacity="0" />
      <stop offset="20%" stop-color="#c8a040" stop-opacity="0.5" />
      <stop offset="80%" stop-color="#c8a040" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#c8a040" stop-opacity="0" />
    </linearGradient>
    <filter id="shadowDrop" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4" />
    </filter>
    <filter id="iconGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="b" />
      <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <rect width="920" height="780" fill="url(#bg)" />

  <!-- Tier label -->
  <line x1="100" y1="14" x2="820" y2="14" stroke="url(#tierGrad)" stroke-width="0.5" />
  <text x="460" y="34" text-anchor="middle" fill="#c8a040" opacity="0.75"
    font-family="Georgia,'Times New Roman',serif" font-size="12" font-weight="bold"
    letter-spacing="2.5">TRAINING GUIDELINES · samaṇakaraṇa dhammā</text>

  <!-- Diagonal guide -->
  <line x1="80" y1="55" x2="310" y2="700" stroke="#4a8898" stroke-width="1.5" opacity="0.07" />

  <!-- Refrain text (beside first connector) -->
  <text x="510" y="380" fill="#8898b0" opacity="0.55"
    font-family="Georgia,'Times New Roman',serif" font-size="12" font-style="italic">“Do not let the goal pass you by, while there is still more to be done”</text>
  <text x="520" y="398" fill="#708878" opacity="0.45"
    font-family="Georgia,'Times New Roman',serif" font-size="10" font-style="italic">mā vo attho parihāyi, sati uttariṁ karaṇīye</text>

  <!-- Step 1: Conscience and Moral Dread -->
  <g transform="translate(38, 82)">
    <rect width="360" height="82" rx="10" fill="url(#stg1)" stroke="#4a6080" stroke-width="0.8" stroke-opacity="0.4" filter="url(#shadowDrop)" />
    <circle cx="20" cy="20" r="10" fill="none" stroke="#c8a040" stroke-width="0.9" opacity="0.7" />
    <text x="20" y="23" text-anchor="middle" fill="#c8a040" font-family="Georgia,'Times New Roman',serif" font-size="12" font-weight="bold">1</text>
    <text x="40" y="22" fill="#c8d8e8" font-family="Georgia,'Times New Roman',serif" font-size="13" font-weight="bold">Conscience and Moral Dread · <tspan font-size="11" font-style="italic" font-weight="normal">hirottappa</tspan></text>
    <text x="40" y="42" fill="#607888" font-family="Georgia,'Times New Roman',serif" font-size="11">Possessing an internal sense of right and wrong</text>
    <text x="40" y="62" fill="#607888" font-family="Georgia,'Times New Roman',serif" font-size="11">alongside a steadfast fear of wrongdoing</text>
    <!-- Icon: virtue-tablet -->
    <g transform="translate(338, 22) scale(1.2)" opacity="0.5" filter="url(#iconGlow)">
      <g fill="none" stroke="#89a8c0" stroke-linecap="round" stroke-linejoin="round">
        <rect x="-10" y="-13" width="18" height="22" rx="2" stroke-width="1.1" />
        <line x1="-6" y1="-7" x2="5" y2="-7" stroke-width="0.9" />
        <line x1="-6" y1="-2" x2="3" y2="-2" stroke-width="0.9" />
        <line x1="-6" y1="3" x2="1" y2="3" stroke-width="0.9" />
        <path d="M -2 8 L 1 11 L 7 5" stroke-width="1.2" />
      </g>
    </g>
  </g>

  <!-- Connector 12 -->
  <path d="M 218 164 C 218 174, 253 172, 253 182" fill="none" stroke="#c8a040" stroke-width="0.6" opacity="0.3" />
  <circle cx="253" cy="182" r="2" fill="#c8a040" opacity="0.35" />

  <!-- Step 2: Pure Conduct (body, speech, mind) -->
  <g transform="translate(73, 182)">
    <rect width="360" height="95" rx="10" fill="url(#stg2)" stroke="#4a6080" stroke-width="0.8" stroke-opacity="0.4" filter="url(#shadowDrop)" />
    <circle cx="20" cy="20" r="10" fill="none" stroke="#c8a040" stroke-width="0.9" opacity="0.7" />
    <text x="20" y="23" text-anchor="middle" fill="#c8a040" font-family="Georgia,'Times New Roman',serif" font-size="12" font-weight="bold">2</text>
    <text x="40" y="22" fill="#c8d8e8" font-family="Georgia,'Times New Roman',serif" font-size="13" font-weight="bold">Pure Conduct</text>
    <text x="40" y="42" fill="#6888a0" font-family="Georgia,'Times New Roman',serif" font-size="11" font-style="italic">kāya · vacī · mano samācāra</text>
    <text x="40" y="62" fill="#607888" font-family="Georgia,'Times New Roman',serif" font-size="11">Maintaining pure, open, and restrained behavior</text>
    <text x="40" y="82" fill="#607888" font-family="Georgia,'Times New Roman',serif" font-size="11">that brings no reproach to oneself or others</text>
    <!-- Icon: triple-purity -->
    <g transform="translate(330, 28) scale(1.5)" opacity="0.55" filter="url(#iconGlow)">
      <g fill="none" stroke="#89a8c0" stroke-linecap="round" stroke-linejoin="round">
        <!-- kāya: upright figure — top-left vertex -->
        <g transform="translate(-10, -8)">
          <circle cx="0" cy="-3" r="1.8" stroke-width="0.9" />
          <line x1="0" y1="-1.2" x2="0" y2="4.5" stroke-width="0.9" />
          <line x1="0" y1="1.5" x2="-2.5" y2="3.5" stroke-width="0.7" />
          <line x1="0" y1="1.5" x2="2.5" y2="3.5" stroke-width="0.7" />
          <line x1="0" y1="4.5" x2="-2" y2="7.5" stroke-width="0.7" />
          <line x1="0" y1="4.5" x2="2" y2="7.5" stroke-width="0.7" />
        </g>
        <!-- vacī: speech bubble — top-right vertex -->
        <g transform="translate(10, -8)">
          <path d="M -5 -5 Q 0 -7, 5 -4 Q 7 -1, 4 3 Q 1 5, -2 3 L -4 6 L -3 2 Q -6 -1, -5 -5 Z" stroke-width="0.9" />
          <line x1="-2" y1="-2.5" x2="2.5" y2="-2.5" stroke-width="0.5" opacity="0.55" />
          <line x1="-2" y1="-0.5" x2="2" y2="-0.5" stroke-width="0.5" opacity="0.55" />
          <line x1="-1" y1="1.5" x2="1.5" y2="1.5" stroke-width="0.5" opacity="0.45" />
        </g>
        <!-- mano: radiant mind — bottom vertex -->
        <g transform="translate(0, 10)">
          <circle cx="0" cy="0" r="2.5" stroke-width="0.9" />
          <circle cx="0" cy="0" r="0.8" fill="#89a8c0" stroke="none" opacity="0.5" />
          <path d="M 0 -5 L 0 -8 M -4 -3 L -7 -5 M 4 -3 L 7 -5 M -4 3 L -7 5 M 4 3 L 7 5 M 0 5 L 0 8" stroke-width="0.6" opacity="0.8" />
        </g>
        <!-- Subtle triangle connecting lines -->
        <line x1="-6" y1="-2" x2="6" y2="-2" stroke-width="0.3" opacity="0.2" stroke-dasharray="2 2" />
        <line x1="-7" y1="-1" x2="-2" y2="6" stroke-width="0.3" opacity="0.2" stroke-dasharray="2 2" />
        <line x1="7" y1="-1" x2="2" y2="6" stroke-width="0.3" opacity="0.2" stroke-dasharray="2 2" />
      </g>
    </g>
  </g>

  <!-- Connector 23 -->
  <path d="M 253 277 C 253 287, 288 285, 288 295" fill="none" stroke="#c8a040" stroke-width="0.6" opacity="0.3" />
  <circle cx="288" cy="295" r="2" fill="#c8a040" opacity="0.35" />

  <!-- Step 3: Pure Livelihood -->
  <g transform="translate(108, 295)">
    <rect width="360" height="82" rx="10" fill="url(#stg3)" stroke="#4a6080" stroke-width="0.8" stroke-opacity="0.4" filter="url(#shadowDrop)" />
    <circle cx="20" cy="20" r="10" fill="none" stroke="#c8a040" stroke-width="0.9" opacity="0.7" />
    <text x="20" y="22" text-anchor="middle" fill="#c8a040" font-family="Georgia,'Times New Roman',serif" font-size="12" font-weight="bold">3</text>
    <text x="40" y="22" fill="#c8d8e8" font-family="Georgia,'Times New Roman',serif" font-size="13" font-weight="bold">Pure Livelihood · <tspan font-size="11" font-style="italic" font-weight="normal">parisuddho ājīvo</tspan></text>
    <text x="40" y="42" fill="#607888" font-family="Georgia,'Times New Roman',serif" font-size="11">Sustaining an open, restrained livelihood</text>
    <text x="40" y="62" fill="#607888" font-family="Georgia,'Times New Roman',serif" font-size="11">that is completely free from blame and self-reproach</text>
    <!-- Icon: bowl-robe -->
    <g transform="translate(338, 22)" opacity="0.5" filter="url(#iconGlow)">
      <g transform="scale(1.08) translate(-14, -12.85)">
        <path d="M 0 18 Q 14 28, 28 18" fill="none" stroke="#6888a0" stroke-width="1.2" />
        <line x1="0" y1="18" x2="28" y2="18" stroke="#6888a0" stroke-width="0.8" />
        <path d="M 6 4 L 14 0 L 22 4 L 18 14 L 10 14 Z" fill="none" stroke="#80a0b0" stroke-width="0.8" opacity="0.6" />
      </g>
    </g>
  </g>

  <!-- Connector 34 -->
  <path d="M 288 377 C 288 387, 323 385, 323 395" fill="none" stroke="#c8a040" stroke-width="0.6" opacity="0.3" />
  <circle cx="323" cy="395" r="2" fill="#c8a040" opacity="0.35" />

  <!-- Step 4: Guarding the Sense Faculties -->
  <g transform="translate(143, 395)">
    <rect width="360" height="82" rx="10" fill="url(#stg4)" stroke="#4a6080" stroke-width="0.8" stroke-opacity="0.4" filter="url(#shadowDrop)" />
    <circle cx="20" cy="20" r="10" fill="none" stroke="#c8a040" stroke-width="0.9" opacity="0.7" />
    <text x="20" y="23" text-anchor="middle" fill="#c8a040" font-family="Georgia,'Times New Roman',serif" font-size="12" font-weight="bold">4</text>
    <text x="40" y="22" fill="#c8d8e8" font-family="Georgia,'Times New Roman',serif" font-size="13" font-weight="bold">Guarding the Sense Faculties</text>
    <text x="40" y="42" fill="#6888a0" font-family="Georgia,'Times New Roman',serif" font-size="11" font-style="italic">indriyesu guttadvāra</text>
    <text x="40" y="62" fill="#607888" font-family="Georgia,'Times New Roman',serif" font-size="11">Not grasping at features, not enticed by details</text>
    <!-- Icon: eye-shield -->
    <g transform="translate(330, 22)" opacity="0.5" filter="url(#iconGlow)">
      <g transform="scale(0.95) translate(-16, -16)">
        <path d="M 0 16 Q 16 4, 32 16" fill="none" stroke="#6888a0" stroke-width="1.2" />
        <path d="M 0 16 Q 16 28, 32 16" fill="none" stroke="#6888a0" stroke-width="1.2" />
        <circle cx="16" cy="16" r="4" fill="none" stroke="#6888a0" stroke-width="1" />
        <line x1="6" y1="4" x2="6" y2="28" stroke="#80a0b0" stroke-width="0.7" opacity="0.5" />
        <line x1="26" y1="4" x2="26" y2="28" stroke="#80a0b0" stroke-width="0.7" opacity="0.5" />
      </g>
    </g>
  </g>

  <!-- Connector 45 -->
  <path d="M 323 477 C 323 487, 358 485, 358 495" fill="none" stroke="#c8a040" stroke-width="0.6" opacity="0.3" />
  <circle cx="358" cy="495" r="2" fill="#c8a040" opacity="0.35" />

  <!-- Step 5: Moderation in Eating -->
  <g transform="translate(178, 495)">
    <rect width="370" height="82" rx="10" fill="url(#stg5)" stroke="#4a6080" stroke-width="0.8" stroke-opacity="0.4" filter="url(#shadowDrop)" />
    <circle cx="20" cy="20" r="10" fill="none" stroke="#c8a040" stroke-width="0.9" opacity="0.7" />
    <text x="20" y="23" text-anchor="middle" fill="#c8a040" font-family="Georgia,'Times New Roman',serif" font-size="12" font-weight="bold">5</text>
    <text x="40" y="22" fill="#c8d8e8" font-family="Georgia,'Times New Roman',serif" font-size="13" font-weight="bold">Moderation in Eating</text>
    <text x="40" y="42" fill="#6888a0" font-family="Georgia,'Times New Roman',serif" font-size="11" font-style="italic">bhojane mattaññutā</text>
    <text x="40" y="62" fill="#607888" font-family="Georgia,'Times New Roman',serif" font-size="11">Not for pleasure, not for indulgence — only for support of the body</text>
    <!-- Icon: moderation-bowl -->
    <g transform="translate(338, 22)" opacity="0.5" filter="url(#iconGlow)">
      <g transform="scale(1.08) translate(0, -5)">
        <g fill="none" stroke="#78a0a0" stroke-linecap="round" stroke-linejoin="round">
          <ellipse cx="0" cy="-3" rx="14" ry="5" stroke-width="1.2" />
          <path d="M -14 -3 C -14 5 -10 16 0 18 C 10 16 14 5 14 -3" stroke-width="1.2" />
          <line x1="-9" y1="6" x2="9" y2="6" stroke-width="0.7" opacity="0.5" />
        </g>
      </g>
    </g>
  </g>

  <!-- Connector 56 -->
  <path d="M 358 577 C 358 587, 393 585, 393 595" fill="none" stroke="#c8a040" stroke-width="0.6" opacity="0.3" />
  <circle cx="393" cy="595" r="2" fill="#c8a040" opacity="0.35" />

  <!-- Step 6: Wakefulness -->
  <g transform="translate(213, 595)">
    <rect width="360" height="82" rx="10" fill="url(#stg6)" stroke="#4a6080" stroke-width="0.8" stroke-opacity="0.4" filter="url(#shadowDrop)" />
    <circle cx="20" cy="20" r="10" fill="none" stroke="#c8a040" stroke-width="0.9" opacity="0.7" />
    <text x="20" y="24" text-anchor="middle" fill="#c8a040" font-family="Georgia,'Times New Roman',serif" font-size="12" font-weight="bold">6</text>
    <text x="40" y="22" fill="#c8d8e8" font-family="Georgia,'Times New Roman',serif" font-size="13" font-weight="bold">Devotion to Wakefulness</text>
    <text x="40" y="42" fill="#6888a0" font-family="Georgia,'Times New Roman',serif" font-size="11" font-style="italic">jāgariyaṁ anuyutto</text>
    <text x="40" y="62" fill="#607888" font-family="Georgia,'Times New Roman',serif" font-size="11">Purifying the mind from obstructive states day and night</text>
    <!-- Icon: wakefulness-moon -->
    <g transform="translate(338, 22)" opacity="0.5" filter="url(#iconGlow)">
      <g transform="scale(1.31) translate(-5.95, -1.45)">
        <g fill="none" stroke="#88a878" stroke-linecap="round" stroke-linejoin="round">
          <path d="M 5 -10 A 10 10 0 1 0 5 10 A 7 7 0 0 1 5 -10 Z" stroke-width="1.2" />
          <line x1="12" y1="-5" x2="16" y2="-7" stroke-width="1" />
          <line x1="13" y1="3" x2="17" y2="3" stroke-width="1" />
          <line x1="10" y1="10" x2="14" y2="13" stroke-width="1" />
        </g>
      </g>
    </g>
  </g>

  <!-- Connector 67 -->
  <path d="M 393 677 C 393 687, 420 685, 420 695" fill="none" stroke="#c8a040" stroke-width="0.6" opacity="0.3" />
  <circle cx="420" cy="695" r="2" fill="#c8a040" opacity="0.35" />

  <!-- Step 7: Mindfulness and Clear Awareness -->
  <g transform="translate(248, 695)">
    <rect width="360" height="95" rx="10" fill="url(#stg7)" stroke="#4a6080" stroke-width="0.8" stroke-opacity="0.4" filter="url(#shadowDrop)" />
    <circle cx="20" cy="20" r="10" fill="none" stroke="#c8a040" stroke-width="0.9" opacity="0.7" />
    <text x="20" y="23" text-anchor="middle" fill="#c8a040" font-family="Georgia,'Times New Roman',serif" font-size="12" font-weight="bold">7</text>
    <text x="40" y="22" fill="#c8d8e8" font-family="Georgia,'Times New Roman',serif" font-size="13" font-weight="bold">Clear Present Moment Awareness</text>
    <text x="40" y="42" fill="#6888a0" font-family="Georgia,'Times New Roman',serif" font-size="11" font-style="italic">satisampajañña</text>
    <text x="40" y="62" fill="#607888" font-family="Georgia,'Times New Roman',serif" font-size="11">Maintaining continuous, clear awareness</text>
    <text x="40" y="82" fill="#607888" font-family="Georgia,'Times New Roman',serif" font-size="11">throughout every physical movement, posture, and daily activity</text>
    <!-- Icon: clear-awareness-fourfold -->
    <g transform="translate(330, 30)" opacity="0.5" filter="url(#iconGlow)">
      <g transform="scale(1) translate(-21.95, -24)">
        <g stroke-linecap="round" stroke-linejoin="round">
          <g opacity="0.65" stroke="#c8a040" fill="none" stroke-width="1">
            <path d="M 0 8 Q 8 0, 16 8" />
            <path d="M 0 8 Q 8 16, 16 8" />
            <circle cx="8" cy="8" r="2.5" stroke-width="0.8" />
          </g>
          <g transform="translate(30,0)" opacity="0.45" stroke="#7888a0" fill="none" stroke-width="1">
            <path d="M 12 2 Q 4 2, 4 10 Q 4 16, 8 16" />
            <path d="M 8 10 Q 10 8, 10 12" stroke-width="0.7" />
          </g>
          <g transform="translate(0,30)" opacity="0.45" stroke="#7888a0" fill="none" stroke-width="1">
            <path d="M 4 16 L 4 6 Q 4 2, 8 2 Q 12 2, 12 6 L 12 10" />
            <path d="M 12 8 Q 12 5, 15 5 Q 18 5, 18 8 L 18 12" stroke-width="0.7" />
            <line x1="4" y1="16" x2="18" y2="16" stroke-width="0.7" />
          </g>
          <g transform="translate(30,30)" opacity="0.45" stroke="#7888a0" fill="none" stroke-width="0.8">
            <circle cx="8" cy="10" r="6" />
            <circle cx="8" cy="10" r="2" fill="#7888a0" fill-opacity="0.3" stroke="none" />
            <path d="M 2 4 Q 8 0, 14 4" stroke-width="0.6" opacity="0.5" />
          </g>
        </g>
      </g>
    </g>
  </g>
</svg>
