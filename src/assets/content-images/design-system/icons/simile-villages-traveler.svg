<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <g transform="translate(12, 12) scale(0.50107) translate(-0.425, -1.1625)">
    <g opacity="0.8" fill="none" stroke="#90a8c0" stroke-linecap="round" stroke-linejoin="round">
          <!-- Winding road between villages -->
          <path d="M -20 8 Q -12 2, -2 4 Q 8 6, 18 0" stroke-width="1.3" />
          <path d="M -20 12 Q -12 6, -2 8 Q 8 10, 18 4" stroke-width="0.9" opacity="0.5" />
          <!-- Village 1 (left) — small hut -->
          <path d="M -19 -2 L -15 -7 L -11 -2" stroke-width="1" />
          <line x1="-18" y1="-2" x2="-18" y2="4" stroke-width="0.8" />
          <line x1="-12" y1="-2" x2="-12" y2="4" stroke-width="0.8" />
          <!-- Village 2 (center) — small hut -->
          <path d="M -3 -4 L 1 -9 L 5 -4" stroke-width="1" />
          <line x1="-2" y1="-4" x2="-2" y2="2" stroke-width="0.8" />
          <line x1="4" y1="-4" x2="4" y2="2" stroke-width="0.8" />
          <!-- Village 3 (right) — small hut -->
          <path d="M 13 -8 L 17 -13 L 21 -8" stroke-width="1" />
          <line x1="14" y1="-8" x2="14" y2="-2" stroke-width="0.8" />
          <line x1="20" y1="-8" x2="20" y2="-2" stroke-width="0.8" />
          <!-- Traveler walking on the road -->
          <circle cx="8" cy="2" r="2" stroke-width="0.9" />
          <line x1="8" y1="4" x2="8" y2="10" stroke-width="0.9" />
          <line x1="8" y1="7" x2="5" y2="9" stroke-width="0.8" />
          <line x1="8" y1="7" x2="11" y2="9" stroke-width="0.8" />
          <line x1="8" y1="10" x2="6" y2="14" stroke-width="0.8" />
          <line x1="8" y1="10" x2="10" y2="14" stroke-width="0.8" />
          <!-- Return arrow (recollection) -->
          <path d="M 14 12 Q 6 16, -4 14" stroke-width="0.7" stroke-dasharray="2 2" opacity="0.5" />
          <path d="M -4 14 L -2 11.5 M -4 14 L -1 15.5" stroke-width="0.65" opacity="0.5" />
        </g>
  </g>
</svg>
