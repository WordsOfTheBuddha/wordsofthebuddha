<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <g transform="translate(12, 12) scale(0.63722) translate(-1.9969, -1.7281)">
    <g opacity="0.8" fill="none" stroke="#89a8c0" stroke-linecap="round" stroke-linejoin="round">
          <!-- kāya: upright figure (body conduct) — top-left vertex -->
          <g transform="translate(-10, -8)">
            <circle cx="0" cy="-3" r="1.8" stroke-width="0.9" />
            <line x1="0" y1="-1.2" x2="0" y2="4.5" stroke-width="0.9" />
            <line x1="0" y1="1.5" x2="-2.5" y2="3.5" stroke-width="0.7" />
            <line x1="0" y1="1.5" x2="2.5" y2="3.5" stroke-width="0.7" />
            <line x1="0" y1="4.5" x2="-2" y2="7.5" stroke-width="0.7" />
            <line x1="0" y1="4.5" x2="2" y2="7.5" stroke-width="0.7" />
          </g>
          <!-- vacī: speech bubble (speech conduct) — top-right vertex -->
          <g transform="translate(10, -8)">
            <path d="M -5 -5 Q 0 -7, 5 -4 Q 7 -1, 4 3 Q 1 5, -2 3 L -4 6 L -3 2 Q -6 -1, -5 -5 Z" stroke-width="0.9" />
            <line x1="-2" y1="-2.5" x2="2.5" y2="-2.5" stroke-width="0.5" opacity="0.55" />
            <line x1="-2" y1="-0.5" x2="2" y2="-0.5" stroke-width="0.5" opacity="0.55" />
            <line x1="-1" y1="1.5" x2="1.5" y2="1.5" stroke-width="0.5" opacity="0.45" />
          </g>
          <!-- mano: radiant mind (mental conduct) — bottom vertex -->
          <g transform="translate(0, 10)">
            <circle cx="0" cy="0" r="2.5" stroke-width="0.9" />
            <circle cx="0" cy="0" r="0.8" fill="#89a8c0" stroke="none" opacity="0.5" />
            <path d="M 0 -5 L 0 -8 M -4 -3 L -7 -5 M 4 -3 L 7 -5 M -4 3 L -7 5 M 4 3 L 7 5 M 0 5 L 0 8" stroke-width="0.6" opacity="0.8" />
          </g>
          <!-- Subtle connecting lines between triangle vertices -->
          <line x1="-6" y1="-2" x2="6" y2="-2" stroke-width="0.3" opacity="0.2" stroke-dasharray="2 2" />
          <line x1="-7" y1="-1" x2="-2" y2="6" stroke-width="0.3" opacity="0.2" stroke-dasharray="2 2" />
          <line x1="7" y1="-1" x2="2" y2="6" stroke-width="0.3" opacity="0.2" stroke-dasharray="2 2" />
        </g>
  </g>
