<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <g transform="translate(12, 12) scale(0.72329) translate(-3.5, 2.125)">
    <g opacity="0.78" stroke="#a08090" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <!-- Burdened figure — slightly hunched under weight -->
          <circle cx="-2" cy="-8" r="3.2" stroke-width="1" />
          <path d="M -2 -4.8 Q -1 -1, -1 4" stroke-width="1" />
          <line x1="-1" y1="4" x2="-5" y2="12" stroke-width="0.95" />
          <line x1="-1" y1="4" x2="3" y2="12" stroke-width="0.95" />
          <!-- Arm reaching up to hold sack -->
          <path d="M -2 -2 Q -5 -4, -7 -3" stroke-width="0.9" />
          <!-- Arm supporting sack from below -->
          <path d="M -1 -1 Q 3 -3, 5 -4" stroke-width="0.9" />
          <!-- Heavy money sack on shoulder — rounded bag shape -->
          <path d="M 1 -8 Q 3 -12, 7 -12 Q 12 -12, 13 -7 Q 13 -2, 9 0 Q 5 1, 3 -2 Q 1 -4, 1 -8 Z" stroke-width="1" />
          <!-- Sack tie at top -->
          <path d="M 5 -12 L 6 -14 L 8 -12" stroke-width="0.7" />
          <!-- Coins implied (debt markers) -->
          <circle cx="10" cy="-13" r="1.6" stroke-width="0.7" />
          <circle cx="12.5" cy="-11" r="1.6" stroke-width="0.7" />
          <circle cx="7" cy="-15" r="1.4" stroke-width="0.65" opacity="0.7" />
        </g>
  </g>
</svg>
