<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <g transform="translate(12, 12) scale(0.46933) translate(0, 3.025)">
    <g opacity="0.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <!-- Mountain ridges behind lake -->
          <path d="M -22 -10 L -14 -18 L -6 -10" stroke="#6a88a8" stroke-width="0.8" opacity="0.45" />
          <path d="M -10 -10 L -2 -20 L 8 -10" stroke="#6a88a8" stroke-width="0.9" opacity="0.5" />
          <path d="M 4 -10 L 14 -18 L 22 -10" stroke="#6a88a8" stroke-width="0.8" opacity="0.45" />
          <!-- Lake surface — smooth, undisturbed ellipse -->
          <ellipse cx="0" cy="-4" rx="22" ry="6" stroke="#6a98b8" stroke-width="1" />
          <!-- Lake body — transparent depth -->
          <path d="M -22 -4 Q -22 12, 0 14 Q 22 12, 22 -4" stroke="#6a98b8" stroke-width="0.8" opacity="0.6" />
          <!-- Visible bottom contents — shells, gravel, pebbles -->
          <circle cx="-10" cy="6" r="1.2" stroke="#8898a8" stroke-width="0.6" opacity="0.55" />
          <circle cx="-6" cy="8" r="0.8" stroke="#8898a8" stroke-width="0.5" opacity="0.45" />
          <circle cx="2" cy="7" r="1" stroke="#8898a8" stroke-width="0.5" opacity="0.5" />
          <circle cx="8" cy="5" r="1.3" stroke="#8898a8" stroke-width="0.6" opacity="0.55" />
          <circle cx="12" cy="8" r="0.7" stroke="#8898a8" stroke-width="0.5" opacity="0.4" />
          <circle cx="-3" cy="10" r="0.9" stroke="#8898a8" stroke-width="0.5" opacity="0.4" />
          <!-- Small fish -->
          <g stroke="#78a090" stroke-width="0.55" opacity="0.55">
            <path d="M -12 3 Q -10 1, -8 3 Q -10 5, -12 3 Z" />
            <line x1="-8" y1="3" x2="-7" y2="2.5" />
            <line x1="-8" y1="3" x2="-7" y2="3.5" />
          </g>
          <g stroke="#78a090" stroke-width="0.5" opacity="0.45">
            <path d="M 5 1 Q 7 -0.5, 9 1 Q 7 2.5, 5 1 Z" />
            <line x1="9" y1="1" x2="10" y2="0.5" />
            <line x1="9" y1="1" x2="10" y2="1.5" />
          </g>
          <!-- Observer on shore -->
          <g stroke="#c0a860" stroke-width="0.7" opacity="0.55">
            <circle cx="-18" cy="-10" r="1.5" />
            <line x1="-18" y1="-8.5" x2="-18" y2="-4" />
            <!-- Sight line downward into lake -->
            <path d="M -17 -8 L -10 2" stroke-dasharray="1.5 2" opacity="0.4" />
          </g>
        </g>
  </g>
</svg>
